<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#06C755">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ChatApp">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>ChatApp</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }

    /* ログイン画面 */
    #login-screen {
      flex: 1; display: flex; justify-content: center; align-items: center;
      background: #06C755;
    }
    .login-card {
      background: white; border-radius: 16px; padding: 32px; width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .login-card h1 { text-align: center; font-size: 28px; margin-bottom: 4px; }
    .login-card p { text-align: center; color: #888; margin-bottom: 24px; }
    .login-card input {
      width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 1px solid #ddd;
      border-radius: 10px; font-size: 15px; outline: none;
    }
    .login-card input:focus { border-color: #06C755; }
    .btn-green {
      width: 100%; padding: 13px; background: #06C755; color: white; border: none;
      border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
    }
    .btn-green:hover { background: #05a847; }
    .switch-link { text-align: center; margin-top: 14px; color: #06C755; cursor: pointer; font-size: 14px; }
    .error-msg { color: #e53935; font-size: 13px; margin-bottom: 8px; text-align: center; }

    /* メイン画面 */
    #app-screen { flex: 1; display: none; flex-direction: row; height: 100vh; }

    /* 左パネル（連絡先） */
    #sidebar {
      width: 300px; background: white; border-right: 1px solid #e0e0e0;
      display: flex; flex-direction: column;
    }
    #sidebar-header {
      background: #06C755; color: white; padding: 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    #sidebar-header h2 { font-size: 18px; }
    #logout-btn { background: none; border: none; color: white; cursor: pointer; font-size: 13px; }
    #my-name { padding: 10px 16px; background: #f9f9f9; font-size: 13px; color: #666; border-bottom: 1px solid #eee; }
    #contacts-list { flex: 1; overflow-y: auto; }
    .contact-item {
      padding: 14px 16px; cursor: pointer; display: flex; align-items: center;
      border-bottom: 1px solid #f0f0f0; transition: background 0.15s;
    }
    .contact-item:hover { background: #f5f5f5; }
    .contact-item.active { background: #e8f5e9; }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%; background: #06C755;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 18px; font-weight: bold; margin-right: 12px;
      flex-shrink: 0; position: relative;
    }
    .online-dot {
      position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px;
      background: #4CAF50; border-radius: 50%; border: 2px solid white;
    }
    .contact-info { flex: 1; }
    .contact-name { font-size: 15px; font-weight: 600; }
    .contact-status { font-size: 12px; color: #aaa; margin-top: 2px; }
    .contact-status.online { color: #06C755; }

    /* 右パネル（チャット） */
    #chat-panel { flex: 1; display: flex; flex-direction: column; }
    #chat-header {
      background: #06C755; color: white; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #chat-header h3 { font-size: 17px; }
    #call-btn {
      background: none; border: none; color: white; font-size: 22px; cursor: pointer;
      padding: 4px 8px; border-radius: 8px;
    }
    #call-btn:hover { background: rgba(255,255,255,0.2); }
    #no-chat {
      flex: 1; display: flex; align-items: center; justify-content: center; color: #aaa;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px; background: #e8f5e9;
      display: none; flex-direction: column; gap: 6px;
    }
    .msg-row { display: flex; }
    .msg-row.mine { justify-content: flex-end; }
    .msg-row.other { justify-content: flex-start; }
    .bubble {
      max-width: 65%; padding: 8px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4;
    }
    .bubble.mine { background: #06C755; color: white; border-bottom-right-radius: 4px; }
    .bubble.other { background: white; color: #333; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 10px; margin-top: 3px; opacity: 0.6; text-align: right; }
    #input-area {
      display: none; padding: 10px; background: white;
      border-top: 1px solid #eee; gap: 8px; align-items: center;
    }
    #msg-input {
      flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 24px;
      font-size: 15px; outline: none; resize: none;
    }
    #msg-input:focus { border-color: #06C755; }
    #send-btn {
      padding: 10px 20px; background: #06C755; color: white; border: none;
      border-radius: 24px; font-size: 14px; font-weight: bold; cursor: pointer;
    }
    #send-btn:hover { background: #05a847; }

    /* 通話モーダル */
    #call-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      justify-content: center; align-items: center; z-index: 100;
    }
    .call-box {
      background: #1a1a2e; border-radius: 24px; padding: 48px 40px;
      text-align: center; width: 320px;
    }
    .call-avatar {
      width: 100px; height: 100px; border-radius: 50%; background: #06C755;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; font-weight: bold; color: white; margin: 0 auto 16px;
    }
    .call-name { color: white; font-size: 24px; font-weight: bold; margin-bottom: 8px; }
    .call-status { color: #aaa; font-size: 15px; margin-bottom: 32px; }
    .call-buttons { display: flex; justify-content: center; gap: 16px; }
    .call-btn {
      padding: 14px 28px; border-radius: 40px; border: none; font-size: 15px;
      font-weight: bold; color: white; cursor: pointer;
    }
    .call-btn.accept { background: #06C755; }
    .call-btn.reject, .call-btn.end { background: #e53935; }
    .call-btn:hover { opacity: 0.85; }

    @media (max-width: 600px) {
      #sidebar { width: 100%; }
      #chat-panel { display: none; }
      #sidebar.hidden { display: none; }
      #chat-panel.show { display: flex; position: fixed; inset: 0; z-index: 10; background: white; }
      #back-btn { display: flex !important; }
      .bubble { max-width: 80%; }
    }
    #back-btn {
      display: none; background: none; border: none; color: white;
      font-size: 22px; cursor: pointer; padding: 4px 8px; margin-right: 4px;
    }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <h1>💬 ChatApp</h1>
    <p id="login-subtitle">ログイン</p>
    <div id="register-fields" style="display:none">
      <input id="displayname-input" type="text" placeholder="表示名（任意）">
    </div>
    <input id="username-input" type="text" placeholder="ユーザー名">
    <input id="password-input" type="password" placeholder="パスワード">
    <div id="error-msg" class="error-msg"></div>
    <button class="btn-green" id="auth-btn">ログイン</button>
    <p class="switch-link" id="switch-link">アカウントを作成する →</p>
  </div>
</div>

<!-- メイン画面 -->
<div id="app-screen">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>トーク</h2>
      <button id="logout-btn">ログアウト</button>
    </div>
    <div id="my-name"></div>
    <div id="contacts-list"></div>
  </div>
  <div id="chat-panel">
    <div id="no-chat"><p>連絡先を選んでチャットを開始</p></div>
    <div id="chat-header" style="display:none">
      <button id="back-btn">←</button>
      <h3 id="chat-contact-name" style="flex:1"></h3>
      <button id="call-btn" title="音声通話">📞</button>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="msg-input" placeholder="メッセージを入力..." rows="1"></textarea>
      <button id="send-btn">送信</button>
    </div>
  </div>
</div>

<!-- 通話モーダル -->
<div id="call-modal">
  <div class="call-box">
    <div class="call-avatar" id="call-avatar-letter"></div>
    <div class="call-name" id="call-modal-name"></div>
    <div class="call-status" id="call-modal-status"></div>
    <div class="call-buttons" id="call-buttons"></div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let token = localStorage.getItem('token');
  let me = JSON.parse(localStorage.getItem('user') || 'null');
  let socket = null;
  let currentContact = null;
  let messages = {};
  let users = [];
  let onlineSet = new Set();
  let isLogin = true;
  // WebRTC
  let pc = null;
  let callTimer = null;
  let callDuration = 0;
  let currentCallContact = null;

  // ========== 認証 ==========
  $('switch-link').onclick = () => {
    isLogin = !isLogin;
    $('login-subtitle').textContent = isLogin ? 'ログイン' : 'アカウント作成';
    $('auth-btn').textContent = isLogin ? 'ログイン' : '登録';
    $('switch-link').textContent = isLogin ? 'アカウントを作成する →' : 'ログインに戻る →';
    $('register-fields').style.display = isLogin ? 'none' : 'block';
  };

  $('auth-btn').onclick = async () => {
    const username = $('username-input').value.trim();
    const password = $('password-input').value.trim();
    const displayName = $('displayname-input').value.trim();
    if (!username || !password) { showError('ユーザー名とパスワードを入力してください'); return; }
    try {
      const res = await fetch(`/api/auth/${isLogin ? 'login' : 'register'}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, displayName })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error); return; }
      token = data.token; me = data.user;
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(me));
      startApp();
    } catch(e) { showError('サーバーに接続できません'); }
  };

  $('password-input').onkeydown = e => { if (e.key === 'Enter') $('auth-btn').click(); };

  function showError(msg) { $('error-msg').textContent = msg; }

  // ========== アプリ起動 ==========
  function startApp() {
    $('login-screen').style.display = 'none';
    $('app-screen').style.display = 'flex';
    $('my-name').textContent = 'ログイン中: ' + (me.displayName || me.username);
    connectSocket();
    fetchUsers();
  }

  $('logout-btn').onclick = () => {
    localStorage.removeItem('token'); localStorage.removeItem('user');
    location.reload();
  };

  // ========== Socket.io ==========
  function connectSocket() {
    socket = io({ auth: { token } });
    socket.on('userOnline', ({ userId }) => { onlineSet.add(userId); renderUsers(); });
    socket.on('userOffline', ({ userId }) => { onlineSet.delete(userId); renderUsers(); });
    socket.on('newMessage', onNewMessage);
    socket.on('incomingCall', onIncomingCall);
    socket.on('callAccepted', onCallAccepted);
    socket.on('callRejected', () => { closeCallModal('相手が拒否しました'); });
    socket.on('callEnded', () => { closeCallModal('通話終了'); });
    socket.on('iceCandidate', async ({ candidate }) => {
      if (pc && candidate) await pc.addIceCandidate(new RTCIceCandidate(candidate));
    });
  }

  // ========== 連絡先 ==========
  async function fetchUsers() {
    const res = await fetch('/api/auth/users', { headers: { Authorization: 'Bearer ' + token } });
    users = (await res.json()).filter(u => u.id !== me.id);
    renderUsers();
  }

  function renderUsers() {
    const list = $('contacts-list');
    list.innerHTML = '';
    if (!users.length) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa">他のユーザーがいません<br><small>別のタブで別アカウントを作ってください</small></div>';
      return;
    }
    users.forEach(u => {
      const online = onlineSet.has(u.id);
      const div = document.createElement('div');
      div.className = 'contact-item' + (currentContact?.id === u.id ? ' active' : '');
      div.innerHTML = `
        <div class="avatar">${(u.displayName||u.username)[0].toUpperCase()}${online ? '<div class="online-dot"></div>' : ''}</div>
        <div class="contact-info">
          <div class="contact-name">${u.displayName || u.username}</div>
          <div class="contact-status ${online ? 'online' : ''}">${online ? 'オンライン' : 'オフライン'}</div>
        </div>`;
      div.onclick = () => openChat(u);
      list.appendChild(div);
    });
  }

  const isMobile = () => window.innerWidth <= 600;

  $('back-btn').onclick = () => {
    $('sidebar').classList.remove('hidden');
    $('chat-panel').classList.remove('show');
  };

  // ========== チャット ==========
  function openChat(contact) {
    currentContact = contact;
    $('no-chat').style.display = 'none';
    $('chat-header').style.display = 'flex';
    $('messages').style.display = 'flex';
    $('input-area').style.display = 'flex';
    $('chat-contact-name').textContent = contact.displayName || contact.username;
    if (isMobile()) {
      $('sidebar').classList.add('hidden');
      $('chat-panel').classList.add('show');
    }
    renderUsers();
    if (!messages[contact.id]) messages[contact.id] = [];
    socket.emit('getMessages', { toUserId: contact.id });
    socket.once('messageHistory', msgs => {
      messages[contact.id] = msgs;
      renderMessages();
    });
  }

  function onNewMessage(msg) {
    const partnerId = msg.fromId === me.id ? msg.toId : msg.fromId;
    if (!messages[partnerId]) messages[partnerId] = [];
    if (!messages[partnerId].find(m => m.id === msg.id)) {
      messages[partnerId].push(msg);
    }
    if (currentContact?.id === partnerId) renderMessages();
  }

  function renderMessages() {
    const box = $('messages');
    box.innerHTML = '';
    (messages[currentContact?.id] || []).forEach(msg => {
      const isMine = msg.fromId === me.id;
      const row = document.createElement('div');
      row.className = 'msg-row ' + (isMine ? 'mine' : 'other');
      const time = new Date(msg.createdAt).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
      row.innerHTML = `<div class="bubble ${isMine ? 'mine' : 'other'}">${escapeHtml(msg.text)}<div class="msg-time">${time}</div></div>`;
      box.appendChild(row);
    });
    box.scrollTop = box.scrollHeight;
  }

  $('send-btn').onclick = sendMessage;
  $('msg-input').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  function sendMessage() {
    const text = $('msg-input').value.trim();
    if (!text || !currentContact || !socket) return;
    socket.emit('sendMessage', { toUserId: currentContact.id, text });
    $('msg-input').value = '';
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // ========== WebRTC 音声通話 ==========
  const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  $('call-btn').onclick = () => startCall(currentContact);

  async function startCall(contact) {
    currentCallContact = contact;
    showCallModal(contact, '呼び出し中...', [
      { label: '📵 終了', cls: 'end', fn: endCall }
    ]);
    pc = new RTCPeerConnection(ICE);
    setupPCEvents(contact.id);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => pc.addTrack(t, stream));
    } catch(e) { alert('マイクへのアクセスを許可してください'); closeCallModal(); return; }
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('callUser', { toUserId: contact.id, signal: offer });
  }

  function onIncomingCall({ fromId, fromName, signal }) {
    const contact = users.find(u => u.id === fromId) || { id: fromId, displayName: fromName, username: fromName };
    currentCallContact = contact;
    showCallModal(contact, '着信中', [
      { label: '📞 受ける', cls: 'accept', fn: () => acceptCall(contact, signal) },
      { label: '📵 断る', cls: 'reject', fn: rejectCall }
    ]);
  }

  async function acceptCall(contact, signal) {
    pc = new RTCPeerConnection(ICE);
    setupPCEvents(contact.id);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => pc.addTrack(t, stream));
    } catch(e) { alert('マイクへのアクセスを許可してください'); return; }
    await pc.setRemoteDescription(new RTCSessionDescription(signal));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answerCall', { toUserId: contact.id, signal: answer });
    startCallTimer();
    showCallModal(contact, '通話中 00:00', [
      { label: '📵 終了', cls: 'end', fn: endCall }
    ]);
  }

  function setupPCEvents(toUserId) {
    pc.onicecandidate = ({ candidate }) => {
      if (candidate) socket.emit('iceCandidate', { toUserId, candidate });
    };
    pc.ontrack = ({ streams }) => {
      const audio = new Audio();
      audio.srcObject = streams[0];
      audio.play();
    };
  }

  function onCallAccepted({ signal }) {
    pc.setRemoteDescription(new RTCSessionDescription(signal));
    startCallTimer();
    showCallModal(currentCallContact, '通話中 00:00', [
      { label: '📵 終了', cls: 'end', fn: endCall }
    ]);
  }

  function rejectCall() {
    if (currentCallContact) socket.emit('rejectCall', { toUserId: currentCallContact.id });
    closeCallModal();
  }

  function endCall() {
    if (currentCallContact) socket.emit('endCall', { toUserId: currentCallContact.id });
    if (pc) { pc.close(); pc = null; }
    closeCallModal();
  }

  function startCallTimer() {
    callDuration = 0;
    if (callTimer) clearInterval(callTimer);
    callTimer = setInterval(() => {
      callDuration++;
      const m = String(Math.floor(callDuration/60)).padStart(2,'0');
      const s = String(callDuration%60).padStart(2,'0');
      $('call-modal-status').textContent = `通話中 ${m}:${s}`;
    }, 1000);
  }

  function showCallModal(contact, status, buttons) {
    $('call-avatar-letter').textContent = (contact.displayName||contact.username)[0].toUpperCase();
    $('call-modal-name').textContent = contact.displayName || contact.username;
    $('call-modal-status').textContent = status;
    const btns = $('call-buttons');
    btns.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'call-btn ' + b.cls;
      btn.textContent = b.label;
      btn.onclick = b.fn;
      btns.appendChild(btn);
    });
    $('call-modal').style.display = 'flex';
  }

  function closeCallModal(msg) {
    if (callTimer) { clearInterval(callTimer); callTimer = null; }
    if (pc) { pc.close(); pc = null; }
    $('call-modal').style.display = 'none';
    currentCallContact = null;
    if (msg) setTimeout(() => alert(msg), 100);
  }

  // ========== 起動時の自動ログイン ==========
  if (token && me) startApp();
</script>
</body>
</html>
