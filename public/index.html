<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#06C755">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ChatApp">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>ChatApp</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }

    /* ログイン画面 */
    #login-screen { flex: 1; display: flex; justify-content: center; align-items: center; background: #06C755; }
    .login-card { background: white; border-radius: 16px; padding: 32px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .login-card h1 { text-align: center; font-size: 28px; margin-bottom: 4px; }
    .login-card p { text-align: center; color: #888; margin-bottom: 24px; }
    .login-card input { width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; }
    .login-card input:focus { border-color: #06C755; }
    .btn-green { width: 100%; padding: 13px; background: #06C755; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-green:hover { background: #05a847; }
    .switch-link { text-align: center; margin-top: 14px; color: #06C755; cursor: pointer; font-size: 14px; }
    .error-msg { color: #e53935; font-size: 13px; margin-bottom: 8px; text-align: center; }

    /* メイン画面 */
    #app-screen { flex: 1; display: none; flex-direction: row; height: 100vh; }

    /* サイドバー */
    #sidebar { width: 300px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
    #sidebar-header { background: #06C755; color: white; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    #sidebar-header h2 { font-size: 18px; }
    #header-btns { display: flex; gap: 8px; align-items: center; }
    #add-friend-btn { background: rgba(255,255,255,0.25); border: none; color: white; cursor: pointer; font-size: 20px; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    #logout-btn { background: none; border: none; color: white; cursor: pointer; font-size: 13px; }

    /* 自分のID表示 */
    #my-info { padding: 10px 16px; background: #f0faf4; border-bottom: 1px solid #e0f0e8; }
    #my-info-name { font-size: 13px; color: #444; font-weight: 600; }
    #my-info-code { font-size: 12px; color: #06C755; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
    #copy-code-btn { font-size: 11px; background: #06C755; color: white; border: none; border-radius: 4px; padding: 2px 6px; cursor: pointer; }

    #contacts-list { flex: 1; overflow-y: auto; }
    .contact-item { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    .contact-item:hover { background: #f5f5f5; }
    .contact-item.active { background: #e8f5e9; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: #06C755; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: bold; margin-right: 12px; flex-shrink: 0; position: relative; }
    .online-dot { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; background: #4CAF50; border-radius: 50%; border: 2px solid white; }
    .contact-info { flex: 1; }
    .contact-name { font-size: 15px; font-weight: 600; }
    .contact-status { font-size: 12px; color: #aaa; margin-top: 2px; }
    .contact-status.online { color: #06C755; }

    /* チャットパネル */
    #chat-panel { flex: 1; display: flex; flex-direction: column; }
    #chat-header { background: #06C755; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 8px; }
    #chat-header h3 { flex: 1; font-size: 17px; }
    #call-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
    #call-btn:hover { background: rgba(255,255,255,0.2); }
    #no-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aaa; gap: 12px; }
    #no-chat-add { background: #06C755; color: white; border: none; border-radius: 20px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; background: #e8f5e9; display: none; flex-direction: column; gap: 6px; }
    .msg-row { display: flex; }
    .msg-row.mine { justify-content: flex-end; }
    .bubble { max-width: 65%; padding: 8px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
    .bubble.mine { background: #06C755; color: white; border-bottom-right-radius: 4px; }
    .bubble.other { background: white; color: #333; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 10px; margin-top: 3px; opacity: 0.6; text-align: right; }
    #input-area { display: none; padding: 10px; background: white; border-top: 1px solid #eee; gap: 8px; align-items: center; }
    #msg-input { flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 24px; font-size: 15px; outline: none; resize: none; }
    #msg-input:focus { border-color: #06C755; }
    #send-btn { padding: 10px 20px; background: #06C755; color: white; border: none; border-radius: 24px; font-size: 14px; font-weight: bold; cursor: pointer; }

    /* モーダル共通 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; }
    .modal-box { background: white; border-radius: 20px; padding: 28px; width: 320px; }
    .modal-box h3 { font-size: 18px; margin-bottom: 16px; text-align: center; }
    .modal-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 4px; font-size: 20px; font-weight: bold; }
    .modal-box input:focus { border-color: #06C755; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .btn-cancel { background: #f0f0f0; color: #666; }
    .btn-confirm { background: #06C755; color: white; }
    .search-result { padding: 12px; background: #f9f9f9; border-radius: 10px; margin-bottom: 12px; display: none; align-items: center; gap: 12px; }
    .search-result .avatar { width: 40px; height: 40px; font-size: 16px; margin-right: 0; }
    .modal-error { color: #e53935; font-size: 13px; text-align: center; margin-bottom: 8px; }

    /* 通話モーダル */
    #call-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 200; }
    .call-box { background: #1a1a2e; border-radius: 24px; padding: 48px 40px; text-align: center; width: 320px; }
    .call-avatar { width: 100px; height: 100px; border-radius: 50%; background: #06C755; display: flex; align-items: center; justify-content: center; font-size: 42px; font-weight: bold; color: white; margin: 0 auto 16px; }
    .call-name { color: white; font-size: 24px; font-weight: bold; margin-bottom: 8px; }
    .call-status { color: #aaa; font-size: 15px; margin-bottom: 32px; }
    .call-buttons { display: flex; justify-content: center; gap: 16px; }
    .call-btn { padding: 14px 28px; border-radius: 40px; border: none; font-size: 15px; font-weight: bold; color: white; cursor: pointer; }
    .call-btn.accept { background: #06C755; }
    .call-btn.reject, .call-btn.end { background: #e53935; }

    #back-btn { display: none; background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 4px 8px; }

    /* ファイル添付 */
    #attach-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 8px; color: #888; flex-shrink: 0; }
    #attach-btn:hover { color: #06C755; }
    #file-preview-bar { display: none; padding: 8px 12px; background: #f0faf4; border-top: 1px solid #d0ecd8; align-items: center; gap: 10px; }
    #file-preview-bar img { max-height: 60px; max-width: 80px; border-radius: 6px; object-fit: cover; }
    #file-preview-name { flex: 1; font-size: 13px; color: #444; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-preview-cancel { background: none; border: none; font-size: 18px; cursor: pointer; color: #888; }
    .msg-image { max-width: 220px; max-height: 220px; border-radius: 12px; cursor: pointer; display: block; margin-bottom: 4px; }
    .msg-file { display: flex; align-items: center; gap: 8px; padding: 8px 4px; text-decoration: none; color: inherit; }
    .msg-file-icon { font-size: 24px; }
    .msg-file-info { display: flex; flex-direction: column; }
    .msg-file-name { font-size: 14px; font-weight: 600; }
    .msg-file-size { font-size: 11px; opacity: 0.7; }
    /* 画像拡大モーダル */
    #img-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; justify-content: center; align-items: center; }
    #img-modal img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
    #img-modal-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 32px; cursor: pointer; background: none; border: none; }

    @media (max-width: 600px) {
      #sidebar { width: 100%; }
      #chat-panel { display: none; }
      #sidebar.hidden { display: none; }
      #chat-panel.show { display: flex; position: fixed; inset: 0; z-index: 10; background: white; flex-direction: column; }
      #back-btn { display: block; }
      .bubble { max-width: 80%; }
      .modal-box { width: 90%; margin: 0 16px; }
    }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <h1>💬 ChatApp</h1>
    <p id="login-subtitle">ログイン</p>
    <div id="register-fields" style="display:none">
      <input id="displayname-input" type="text" placeholder="表示名（任意）">
    </div>
    <input id="username-input" type="text" placeholder="ユーザー名">
    <input id="password-input" type="password" placeholder="パスワード">
    <div id="error-msg" class="error-msg"></div>
    <button class="btn-green" id="auth-btn">ログイン</button>
    <p class="switch-link" id="switch-link">アカウントを作成する →</p>
  </div>
</div>

<!-- メイン画面 -->
<div id="app-screen">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>💬 トーク</h2>
      <div id="header-btns">
        <button id="add-friend-btn" title="友達追加">＋</button>
        <button id="logout-btn">ログアウト</button>
      </div>
    </div>
    <div id="my-info">
      <div id="my-info-name"></div>
      <div id="my-info-code">
        <span>友達ID: <strong id="my-code"></strong></span>
        <button id="copy-code-btn">コピー</button>
      </div>
    </div>
    <div id="contacts-list"></div>
  </div>

  <div id="chat-panel">
    <div id="no-chat">
      <p>友達を追加してチャットを始めよう</p>
      <button id="no-chat-add">＋ 友達を追加</button>
    </div>
    <div id="chat-header" style="display:none">
      <button id="back-btn">←</button>
      <h3 id="chat-contact-name"></h3>
      <button id="call-btn" title="音声通話">📞</button>
    </div>
    <div id="messages"></div>
    <div id="file-preview-bar">
      <span id="file-preview-icon" style="font-size:24px"></span>
      <img id="file-preview-img" src="" style="display:none">
      <span id="file-preview-name"></span>
      <button id="file-preview-cancel">✕</button>
    </div>
    <div id="input-area">
      <input type="file" id="file-input" style="display:none" accept="*/*">
      <button id="attach-btn" title="ファイル・写真を送る">📎</button>
      <textarea id="msg-input" placeholder="メッセージを入力..." rows="1"></textarea>
      <button id="send-btn">送信</button>
    </div>
  </div>
</div>

<!-- 画像拡大モーダル -->
<div id="img-modal">
  <button id="img-modal-close">✕</button>
  <img id="img-modal-img" src="">
</div>

<!-- 友達追加モーダル -->
<div class="modal-overlay" id="add-friend-modal">
  <div class="modal-box">
    <h3>👤 友達追加</h3>
    <p style="text-align:center;color:#888;font-size:13px;margin-bottom:14px">相手の6桁IDを入力してください</p>
    <input id="friend-code-input" type="text" placeholder="000000" maxlength="6" inputmode="numeric">
    <div id="search-result" class="search-result">
      <div class="avatar" id="result-avatar"></div>
      <div>
        <div id="result-name" style="font-weight:600"></div>
        <div id="result-code" style="font-size:12px;color:#888"></div>
      </div>
    </div>
    <div id="modal-error" class="modal-error"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="cancel-add-btn">キャンセル</button>
      <button class="btn-confirm" id="search-btn">検索</button>
    </div>
  </div>
</div>

<!-- 通話モーダル -->
<div id="call-modal">
  <div class="call-box">
    <div class="call-avatar" id="call-avatar-letter"></div>
    <div class="call-name" id="call-modal-name"></div>
    <div class="call-status" id="call-modal-status"></div>
    <div class="call-buttons" id="call-buttons"></div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let token = localStorage.getItem('token');
  let me = JSON.parse(localStorage.getItem('user') || 'null');
  let socket = null;
  let currentContact = null;
  let messages = {};
  let friends = [];
  let onlineSet = new Set();
  let isLogin = true;
  let searchedUser = null;
  let pc = null, callTimer = null, callDuration = 0, currentCallContact = null;

  // ========== 認証 ==========
  $('switch-link').onclick = () => {
    isLogin = !isLogin;
    $('login-subtitle').textContent = isLogin ? 'ログイン' : 'アカウント作成';
    $('auth-btn').textContent = isLogin ? 'ログイン' : '登録';
    $('switch-link').textContent = isLogin ? 'アカウントを作成する →' : 'ログインに戻る →';
    $('register-fields').style.display = isLogin ? 'none' : 'block';
  };

  $('auth-btn').onclick = async () => {
    const username = $('username-input').value.trim();
    const password = $('password-input').value.trim();
    const displayName = $('displayname-input').value.trim();
    if (!username || !password) { showError('ユーザー名とパスワードを入力してください'); return; }
    try {
      const res = await fetch(`/api/auth/${isLogin ? 'login' : 'register'}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, displayName })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error); return; }
      token = data.token; me = data.user;
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(me));
      startApp();
    } catch { showError('サーバーに接続できません'); }
  };
  $('password-input').onkeydown = e => { if (e.key === 'Enter') $('auth-btn').click(); };
  function showError(msg) { $('error-msg').textContent = msg; }

  // ========== アプリ起動 ==========
  function startApp() {
    $('login-screen').style.display = 'none';
    $('app-screen').style.display = 'flex';
    $('my-info-name').textContent = me.displayName || me.username;
    $('my-code').textContent = me.friendCode;
    connectSocket();
    fetchFriends();
  }

  $('logout-btn').onclick = () => { localStorage.removeItem('token'); localStorage.removeItem('user'); location.reload(); };

  $('copy-code-btn').onclick = () => {
    navigator.clipboard.writeText(me.friendCode).then(() => {
      $('copy-code-btn').textContent = '✓';
      setTimeout(() => $('copy-code-btn').textContent = 'コピー', 1500);
    });
  };

  // ========== Socket ==========
  function connectSocket() {
    socket = io({ auth: { token } });
    socket.on('userOnline', ({ userId }) => { onlineSet.add(userId); renderFriends(); });
    socket.on('userOffline', ({ userId }) => { onlineSet.delete(userId); renderFriends(); });
    socket.on('newMessage', onNewMessage);
    socket.on('incomingCall', onIncomingCall);
    socket.on('callAccepted', onCallAccepted);
    socket.on('callRejected', () => closeCallModal('相手が拒否しました'));
    socket.on('callEnded', () => closeCallModal('通話終了'));
    socket.on('iceCandidate', async ({ candidate }) => {
      if (pc && candidate) await pc.addIceCandidate(new RTCIceCandidate(candidate));
    });
  }

  // ========== 友達一覧 ==========
  async function fetchFriends() {
    const res = await fetch('/api/auth/friends', { headers: { Authorization: 'Bearer ' + token } });
    friends = await res.json();
    renderFriends();
  }

  function renderFriends() {
    const list = $('contacts-list');
    list.innerHTML = '';
    if (!friends.length) {
      list.innerHTML = '<div style="padding:24px;text-align:center;color:#aaa;font-size:14px">友達がいません<br><small style="font-size:12px">右上の＋ボタンで友達追加</small></div>';
      return;
    }
    friends.forEach(u => {
      const online = onlineSet.has(u.id);
      const div = document.createElement('div');
      div.className = 'contact-item' + (currentContact?.id === u.id ? ' active' : '');
      div.innerHTML = `
        <div class="avatar">${(u.displayName||u.username)[0].toUpperCase()}${online ? '<div class="online-dot"></div>' : ''}</div>
        <div class="contact-info">
          <div class="contact-name">${u.displayName || u.username}</div>
          <div class="contact-status ${online?'online':''}">${online ? 'オンライン' : 'オフライン'}</div>
        </div>`;
      div.onclick = () => openChat(u);
      list.appendChild(div);
    });
  }

  // ========== 友達追加モーダル ==========
  function openAddFriendModal() {
    $('friend-code-input').value = '';
    $('modal-error').textContent = '';
    $('search-result').style.display = 'none';
    $('search-btn').textContent = '検索';
    searchedUser = null;
    $('add-friend-modal').style.display = 'flex';
    setTimeout(() => $('friend-code-input').focus(), 100);
  }

  $('add-friend-btn').onclick = openAddFriendModal;
  $('no-chat-add').onclick = openAddFriendModal;
  $('cancel-add-btn').onclick = () => { $('add-friend-modal').style.display = 'none'; };

  $('search-btn').onclick = async () => {
    if (searchedUser) {
      // 友達追加実行
      try {
        const res = await fetch('/api/auth/add-friend', {
          method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify({ friendCode: searchedUser.friendCode })
        });
        const data = await res.json();
        if (!res.ok) { $('modal-error').textContent = data.error; return; }
        friends.push(data.friend);
        renderFriends();
        $('add-friend-modal').style.display = 'none';
        openChat(data.friend);
      } catch { $('modal-error').textContent = 'エラーが発生しました'; }
      return;
    }
    // 検索
    const code = $('friend-code-input').value.trim();
    if (code.length !== 6) { $('modal-error').textContent = '6桁のIDを入力してください'; return; }
    $('modal-error').textContent = '';
    try {
      const res = await fetch(`/api/auth/search/${code}`, { headers: { Authorization: 'Bearer ' + token } });
      const data = await res.json();
      if (!res.ok) { $('modal-error').textContent = data.error; $('search-result').style.display = 'none'; return; }
      searchedUser = data;
      $('result-avatar').textContent = (data.displayName||data.username)[0].toUpperCase();
      $('result-name').textContent = data.displayName || data.username;
      $('result-code').textContent = 'ID: ' + data.friendCode;
      $('search-result').style.display = 'flex';
      $('search-btn').textContent = '追加する';
    } catch { $('modal-error').textContent = 'エラーが発生しました'; }
  };

  $('friend-code-input').onkeydown = e => {
    if (e.key === 'Enter') $('search-btn').click();
    // 数字のみ
    if (!/[0-9]/.test(e.key) && !['Backspace','Delete','Tab','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  };
  $('friend-code-input').oninput = () => { searchedUser = null; $('search-btn').textContent = '検索'; $('search-result').style.display = 'none'; $('modal-error').textContent = ''; };

  // ========== チャット ==========
  const isMobile = () => window.innerWidth <= 600;

  $('back-btn').onclick = () => { $('sidebar').classList.remove('hidden'); $('chat-panel').classList.remove('show'); };

  function openChat(contact) {
    currentContact = contact;
    $('no-chat').style.display = 'none';
    $('chat-header').style.display = 'flex';
    $('messages').style.display = 'flex';
    $('input-area').style.display = 'flex';
    $('chat-contact-name').textContent = contact.displayName || contact.username;
    if (isMobile()) { $('sidebar').classList.add('hidden'); $('chat-panel').classList.add('show'); }
    renderFriends();
    if (!messages[contact.id]) messages[contact.id] = [];
    socket.emit('getMessages', { toUserId: contact.id });
    socket.once('messageHistory', msgs => { messages[contact.id] = msgs; renderMessages(); });
  }

  function onNewMessage(msg) {
    const partnerId = msg.fromId === me.id ? msg.toId : msg.fromId;
    if (!messages[partnerId]) messages[partnerId] = [];
    if (!messages[partnerId].find(m => m.id === msg.id)) messages[partnerId].push(msg);
    if (currentContact?.id === partnerId) renderMessages();
  }

  function renderMessages() {
    const box = $('messages');
    box.innerHTML = '';
    (messages[currentContact?.id] || []).forEach(msg => {
      const isMine = msg.fromId === me.id;
      const row = document.createElement('div');
      row.className = 'msg-row ' + (isMine ? 'mine' : 'other');
      const time = new Date(msg.createdAt).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
      let content = '';
      if (msg.file) {
        if (msg.file.type === 'image') {
          content += `<img class="msg-image" src="${msg.file.url}" alt="${escapeHtml(msg.file.originalName)}" onclick="openImgModal('${msg.file.url}')">`;
        } else if (msg.file.type === 'video') {
          content += `<video controls style="max-width:220px;border-radius:12px;display:block;margin-bottom:4px"><source src="${msg.file.url}"></video>`;
        } else {
          const icon = getFileIcon(msg.file.mimeType);
          const size = formatFileSize(msg.file.size);
          content += `<a class="msg-file" href="${msg.file.url}" download="${escapeHtml(msg.file.originalName)}" target="_blank"><span class="msg-file-icon">${icon}</span><span class="msg-file-info"><span class="msg-file-name">${escapeHtml(msg.file.originalName)}</span><span class="msg-file-size">${size}</span></span></a>`;
        }
      }
      if (msg.text) content += `<span>${escapeHtml(msg.text)}</span>`;
      row.innerHTML = `<div class="bubble ${isMine?'mine':'other'}">${content}<div class="msg-time">${time}</div></div>`;
      box.appendChild(row);
    });
    box.scrollTop = box.scrollHeight;
  }

  function getFileIcon(mime) {
    if (!mime) return '📄';
    if (mime.includes('pdf')) return '📕';
    if (mime.includes('word') || mime.includes('document')) return '📝';
    if (mime.includes('excel') || mime.includes('sheet')) return '📊';
    if (mime.includes('zip') || mime.includes('rar') || mime.includes('7z')) return '🗜️';
    if (mime.includes('audio')) return '🎵';
    return '📄';
  }

  function formatFileSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    return (bytes / 1024 / 1024).toFixed(1) + 'MB';
  }

  // 画像拡大
  window.openImgModal = (url) => {
    $('img-modal-img').src = url;
    $('img-modal').style.display = 'flex';
  };
  $('img-modal').onclick = (e) => { if (e.target === $('img-modal') || e.target === $('img-modal-close')) $('img-modal').style.display = 'none'; };

  // ========== ファイル添付 ==========
  let pendingFile = null;

  $('attach-btn').onclick = () => $('file-input').click();

  $('file-input').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    pendingFile = file;
    $('file-preview-bar').style.display = 'flex';
    $('file-preview-name').textContent = file.name;
    if (file.type.startsWith('image/')) {
      const url = URL.createObjectURL(file);
      $('file-preview-img').src = url;
      $('file-preview-img').style.display = 'block';
      $('file-preview-icon').textContent = '';
    } else {
      $('file-preview-img').style.display = 'none';
      $('file-preview-icon').textContent = getFileIcon(file.type);
    }
    $('file-input').value = '';
  };

  $('file-preview-cancel').onclick = () => {
    pendingFile = null;
    $('file-preview-bar').style.display = 'none';
    $('file-preview-img').src = '';
  };

  $('send-btn').onclick = sendMessage;
  $('msg-input').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  async function sendMessage() {
    const text = $('msg-input').value.trim();
    if (!text && !pendingFile) return;
    if (!currentContact || !socket) return;

    let fileData = null;
    if (pendingFile) {
      const formData = new FormData();
      formData.append('file', pendingFile);
      try {
        $('send-btn').textContent = '送信中';
        $('send-btn').disabled = true;
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + token },
          body: formData
        });
        fileData = await res.json();
      } catch {
        alert('ファイルのアップロードに失敗しました');
        return;
      } finally {
        $('send-btn').textContent = '送信';
        $('send-btn').disabled = false;
      }
      pendingFile = null;
      $('file-preview-bar').style.display = 'none';
    }

    socket.emit('sendMessage', { toUserId: currentContact.id, text, file: fileData });
    $('msg-input').value = '';
  }

  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

  // ========== 音声通話 ==========
  const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
  $('call-btn').onclick = () => startCall(currentContact);

  async function startCall(contact) {
    currentCallContact = contact;
    showCallModal(contact, '呼び出し中...', [{ label: '📵 終了', cls: 'end', fn: endCall }]);
    pc = new RTCPeerConnection(ICE);
    setupPCEvents(contact.id);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => pc.addTrack(t, stream));
    } catch { alert('マイクへのアクセスを許可してください'); closeCallModal(); return; }
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('callUser', { toUserId: contact.id, signal: offer });
  }

  function onIncomingCall({ fromId, fromName, signal }) {
    const contact = friends.find(u => u.id === fromId) || { id: fromId, displayName: fromName, username: fromName };
    currentCallContact = contact;
    showCallModal(contact, '着信中', [
      { label: '📞 受ける', cls: 'accept', fn: () => acceptCall(contact, signal) },
      { label: '📵 断る', cls: 'reject', fn: rejectCall }
    ]);
  }

  async function acceptCall(contact, signal) {
    pc = new RTCPeerConnection(ICE);
    setupPCEvents(contact.id);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => pc.addTrack(t, stream));
    } catch { alert('マイクへのアクセスを許可してください'); return; }
    await pc.setRemoteDescription(new RTCSessionDescription(signal));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answerCall', { toUserId: contact.id, signal: answer });
    startCallTimer();
    showCallModal(contact, '通話中 00:00', [{ label: '📵 終了', cls: 'end', fn: endCall }]);
  }

  function setupPCEvents(toUserId) {
    pc.onicecandidate = ({ candidate }) => { if (candidate) socket.emit('iceCandidate', { toUserId, candidate }); };
    pc.ontrack = ({ streams }) => { const a = new Audio(); a.srcObject = streams[0]; a.play(); };
  }

  function onCallAccepted({ signal }) {
    pc.setRemoteDescription(new RTCSessionDescription(signal));
    startCallTimer();
    showCallModal(currentCallContact, '通話中 00:00', [{ label: '📵 終了', cls: 'end', fn: endCall }]);
  }

  function rejectCall() { if (currentCallContact) socket.emit('rejectCall', { toUserId: currentCallContact.id }); closeCallModal(); }
  function endCall() { if (currentCallContact) socket.emit('endCall', { toUserId: currentCallContact.id }); if (pc) { pc.close(); pc = null; } closeCallModal(); }

  function startCallTimer() {
    callDuration = 0;
    if (callTimer) clearInterval(callTimer);
    callTimer = setInterval(() => {
      callDuration++;
      const m = String(Math.floor(callDuration/60)).padStart(2,'0');
      const s = String(callDuration%60).padStart(2,'0');
      $('call-modal-status').textContent = `通話中 ${m}:${s}`;
    }, 1000);
  }

  function showCallModal(contact, status, buttons) {
    $('call-avatar-letter').textContent = (contact.displayName||contact.username)[0].toUpperCase();
    $('call-modal-name').textContent = contact.displayName || contact.username;
    $('call-modal-status').textContent = status;
    const btns = $('call-buttons');
    btns.innerHTML = '';
    buttons.forEach(b => { const btn = document.createElement('button'); btn.className = 'call-btn ' + b.cls; btn.textContent = b.label; btn.onclick = b.fn; btns.appendChild(btn); });
    $('call-modal').style.display = 'flex';
  }

  function closeCallModal(msg) {
    if (callTimer) { clearInterval(callTimer); callTimer = null; }
    if (pc) { pc.close(); pc = null; }
    $('call-modal').style.display = 'none';
    currentCallContact = null;
    if (msg) setTimeout(() => alert(msg), 100);
  }

  if (token && me) startApp();
</script>
</body>
</html>
