<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>通話中 - CHA</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #1a1a2e; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; user-select: none; overflow: hidden; }

    .avatar {
      width: 160px; height: 160px; border-radius: 50%; background: #06C755;
      display: flex; align-items: center; justify-content: center;
      font-size: 68px; font-weight: bold; color: white;
      margin-bottom: 20px; position: relative; z-index: 1; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar.ringing::before, .avatar.ringing::after {
      content: ''; position: absolute; border-radius: 50%;
      border: 3px solid rgba(6,199,85,0.35);
      animation: ripple 1.6s ease-out infinite; z-index: -1;
    }
    .avatar.ringing::after { animation-delay: 0.8s; }
    @keyframes ripple {
      0%   { width: 160px; height: 160px; opacity: 1; }
      100% { width: 300px; height: 300px; opacity: 0; }
    }

    #contact-name { font-size: 26px; font-weight: bold; margin-bottom: 8px; text-align: center; }
    #status { font-size: 13px; color: #888; margin-bottom: 52px; min-height: 18px; text-align: center; letter-spacing: 0.3px; }

    .buttons { display: flex; gap: 28px; align-items: flex-end; }
    .btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .btn-label { font-size: 12px; color: #aaa; }
    .btn {
      border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.2s;
    }
    .btn:active { transform: scale(0.88); }
    .btn-mute    { width: 64px; height: 64px; font-size: 26px; background: #2a2a3e; color: white; }
    .btn-mute.active { background: #e53935; }
    .btn-end     { width: 76px; height: 76px; font-size: 32px; background: #e53935; color: white; }
    .btn-speaker { width: 64px; height: 64px; font-size: 26px; background: #2a2a3e; color: white; }
    .btn-speaker.active { background: #06C755; }
    .btn-camera  { width: 64px; height: 64px; font-size: 26px; background: #2a2a3e; color: white; }
    .btn-camera.active { background: #e53935; }

    /* ===== ビデオ通話レイアウト ===== */
    #video-overlay {
      display: none; position: fixed; inset: 0; z-index: 0;
      background: #000; flex-direction: column;
    }
    #remote-video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    #local-video {
      position: absolute; top: env(safe-area-inset-top, 16px); right: 12px;
      width: 90px; height: 130px; border-radius: 14px;
      object-fit: cover; border: 2px solid rgba(255,255,255,0.5);
      z-index: 2; background: #111;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    /* ビデオ通話時: mainコンテンツをoverlay化 */
    body.video-call #main {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
    }
    body.video-call #main .buttons { pointer-events: auto; }
    body.video-call #main .avatar  { display: none; }
    body.video-call #contact-name  { color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.7); }
    body.video-call #status        { color: rgba(255,255,255,0.8); text-shadow: 0 2px 8px rgba(0,0,0,0.7); }

    #audio-banner {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.80);
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    #audio-banner .tap-btn {
      background: #06C755; color: white; border: none; border-radius: 50px;
      padding: 20px 48px; font-size: 20px; font-weight: bold; cursor: pointer;
      animation: pulse-green 1.2s ease-in-out infinite;
    }
    #audio-banner p { color: #ccc; font-size: 14px; }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(6,199,85,0.5); }
      50%       { box-shadow: 0 0 0 16px rgba(6,199,85,0); }
    }

    #error-box {
      display: none; flex-direction: column; align-items: center; gap: 20px; padding: 32px; text-align: center;
    }
    #error-box p { color: #e57373; font-size: 17px; line-height: 1.6; white-space: pre-line; }
    .btn-back { background: #06C755; color: white; border: none; border-radius: 24px; padding: 12px 28px; font-size: 15px; font-weight: bold; cursor: pointer; }

    audio { display: none; }
  </style>
</head>
<body>
  <!-- ビデオ通話レイヤー（video=trueのとき使用） -->
  <div id="video-overlay">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video"  autoplay muted playsinline></video>
  </div>

  <audio id="remote-audio" autoplay playsinline></audio>
  <audio id="local-audio"  autoplay muted   playsinline></audio>

  <div id="main" style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <div class="avatar" id="avatar"></div>
    <div id="contact-name">接続中...</div>
    <div id="status">相手を待っています...</div>
    <div class="buttons">
      <div class="btn-wrap">
        <button class="btn btn-mute" id="mute-btn" onclick="toggleMute()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="8"  y1="21" x2="16" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line id="mute-slash" x1="3" y1="21" x2="21" y2="3" stroke="white" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
          </svg>
        </button>
        <span class="btn-label" id="mute-label">ミュート</span>
      </div>

      <div class="btn-wrap">
        <button class="btn btn-end" onclick="endCall(true)">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="white">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.37 1.02-.22 1.1.4 2.28.62 3.58.62.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.56 21 3 13.44 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.32.22 2.58.62 3.76.12.33.04.7-.22.97L6.6 10.8z" transform="rotate(135 12 12)"/>
          </svg>
        </button>
        <span class="btn-label">終了</span>
      </div>

      <div class="btn-wrap">
        <button class="btn btn-speaker" id="speaker-btn" onclick="toggleSpeaker()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="btn-label" id="speaker-label">スピーカー</span>
      </div>

      <!-- ビデオ通話時のみ表示 -->
      <div class="btn-wrap" id="camera-toggle-wrap" style="display:none">
        <button class="btn btn-camera" id="camera-btn" onclick="toggleCamera()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
            <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
        </button>
        <span class="btn-label" id="camera-label">カメラOFF</span>
      </div>
    </div>
  </div>

  <div id="audio-banner">
    <button class="tap-btn" onclick="enableAudio()">🔊 タップして音声を開始</button>
    <p>ブラウザの制限により手動で音声を有効にする必要があります</p>
  </div>

  <div id="error-box">
    <p id="error-msg">エラーが発生しました</p>
    <button class="btn-back" onclick="goBack()">← 戻る</button>
  </div>

  <script>
    const params   = new URLSearchParams(location.search);
    const roomId   = params.get('room');
    const isInit   = params.get('initiator') === 'true';
    const calleeId = params.get('to') || null;
    const token    = localStorage.getItem('token');
    // ★ localStorage破損時のJSON.parseクラッシュをtry-catchで防止
    let me = {};
    try { me = JSON.parse(localStorage.getItem('user') || '{}'); } catch {}
    const $        = id => document.getElementById(id);
    // ★ hasVideo は使用前に宣言（TDZバグ修正）
    const hasVideo = params.get('video') === 'true';

    if (!roomId || !token) { location.href = '/'; }
    if (hasVideo) document.body.classList.add('video-call');

    // ★ アバターURLサニタイズ（XSS対策: data:image/ または https:// のみ許可）
    function sanitizeAvatarUrl(url) {
      if (!url || typeof url !== 'string') return '';
      if (url.startsWith('data:image/') || url.startsWith('https://')) return url;
      return '';
    }

    // 相手の情報を即座に表示
    (function showContactInfo() {
      try {
        const c = JSON.parse(localStorage.getItem('callContact') || '{}');
        localStorage.removeItem('callContact');
        if (!c.name) return;
        $('contact-name').textContent = c.name;
        const avatarEl = $('avatar');
        const safeAvatar = sanitizeAvatarUrl(c.avatar);
        if (safeAvatar) {
          const img = document.createElement('img');
          img.src = safeAvatar;
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
          img.onerror = () => { avatarEl.removeChild(img); avatarEl.textContent = c.name[0].toUpperCase(); };
          avatarEl.appendChild(img);
        } else {
          avatarEl.textContent = c.name[0].toUpperCase();
        }
      } catch {}
    })();

    // ══════════════════════════════════════════
    //  状態変数
    // ══════════════════════════════════════════
    let pc              = null;
    let localStream     = null;
    let isMuted         = false;
    let isCameraOff     = false;
    let isSpeakerOn     = false;
    let timerSec        = 0;
    let timerInterval   = null;
    let timerStarted    = false;
    let partnerUserId   = null;
    let _audioCtx       = null;
    let _speakerSource  = null;
    let _audioUnlocked  = false;
    let _audioWatchdog  = null;
    let _iceRestartTimer       = null;
    let _iceRestartCount       = 0;
    let _iceRestartInProgress  = false; // ★ 再入防止フラグ（concurrent restart race対策）
    let _iceCandidateQueue     = [];
    let _sentCandidates        = [];    // ★ 送信済み候補を記録（ソケット再接続後に再送するため）
    let _localStreamReady      = false;
    let _localStreamWaiters    = [];
    let _iceCheckingTimer      = null; // ICE checkingが30秒超えたらrestart
    let _relayFallbackTriggered = false; // ★ relay-only フォールバック済みフラグ
    let _keepAliveTimer     = null; // 接続後のKeep-alive監視
    let _lastPongTime       = 0;
    let _dataChannel        = null; // Keep-alive用DataChannel
    // デフォルトSTUN（複数ソース・冗長化）
    let iceConfig = { iceServers: [
      { urls: 'stun:stun.l.google.com:19302'  },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
      { urls: 'stun:stun3.l.google.com:19302' },
      { urls: 'stun:openrelay.metered.ca:80'  },
    ] };

    // ══════════════════════════════════════════
    //  ICEサーバー読み込み
    // ══════════════════════════════════════════
    async function loadIceServers() {
      try {
        const controller = new AbortController();
        const tid = setTimeout(() => controller.abort(), 6000); // 6秒タイムアウト
        // ★ Authorizationヘッダー付与（TURNクレデンシャル取得のため認証必須）
        const res = await fetch('/api/ice-servers', {
          signal: controller.signal,
          headers: token ? { 'Authorization': 'Bearer ' + token } : {}
        });
        clearTimeout(tid);
        if (!res.ok) return; // フォールバックのまま
        const servers = await res.json();
        if (Array.isArray(servers) && servers.length > 0) {
          iceConfig = { iceServers: servers };
          const hasTurn = servers.some(s => String(s.urls).startsWith('turn'));
          console.log('[ICE] サーバー取得:', servers.length + '件', hasTurn ? '(TURN含む)' : '(STUNのみ)');
        }
      } catch {} // タイムアウト or ネットワーク失敗 → デフォルトSTUNを使用
    }

    // ══════════════════════════════════════════
    //  マイク取得（ページ読み込み直後・Promise化）
    // ══════════════════════════════════════════
    function waitLocalStream() {
      if (_localStreamReady) return Promise.resolve(localStream);
      return new Promise(resolve => _localStreamWaiters.push(resolve));
    }

    const mediaConstraints = hasVideo
      ? { audio: true, video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } }
      : { audio: true, video: false };

    function applyStream(stream) {
      localStream = stream;
      $('local-audio').srcObject = stream;
      _localStreamReady = true;
      _localStreamWaiters.forEach(r => r(stream));
      _localStreamWaiters = [];
      if (hasVideo && stream.getVideoTracks().length > 0) {
        const lv = $('local-video');
        if (lv) { lv.srcObject = stream; lv.play().catch(() => {}); }
        $('video-overlay').style.display = 'flex';
        $('camera-toggle-wrap').style.display = 'flex';
      }
    }

    navigator.mediaDevices.getUserMedia(mediaConstraints)
      .then(applyStream)
      .catch((err) => {
        reportError('getUserMedia failed', err.message);
        // ビデオが失敗した場合、音声のみで再試行
        if (hasVideo) {
          $('status').textContent = 'カメラ不可 → 音声のみで接続中...';
          navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
              applyStream(stream);
              // ビデオオーバーレイは非表示のまま
            })
            .catch(() => showError('マイクの許可が必要です。\nブラウザの設定でマイクを許可してください。'));
        } else {
          showError('マイクの許可が必要です。\nブラウザの設定でマイクを許可してください。');
        }
      });

    // ══════════════════════════════════════════
    //  エラーレポート（サーバーに送信）
    // ══════════════════════════════════════════
    function reportError(context, detail) {
      try {
        fetch('/api/errors', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ context, detail: String(detail), page: 'call', ua: navigator.userAgent, ts: Date.now() })
        }).catch(() => {});
      } catch {}
    }
    window.onerror = (msg, src, line, col, err) => reportError('window.onerror', `${msg} @${src}:${line}`);
    window.addEventListener('unhandledrejection', e => reportError('unhandledrejection', e.reason?.message || String(e.reason)));

    // ══════════════════════════════════════════
    //  ネットワーク監視（オフライン→オンライン復帰時に再接続）
    // ══════════════════════════════════════════
    window.addEventListener('online', () => {
      $('status').textContent = 'ネットワーク復帰 → 再接続中...';
      if (pc && (pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected')) {
        setTimeout(doIceRestart, 500);
      } else if (!pc && socket.connected) {
        socket.emit('joinCallRoom', { roomId, displayName: me.displayName || me.username, avatar: me.avatar || '' });
      }
    });
    window.addEventListener('offline', () => {
      $('status').textContent = 'ネットワーク切断...';
    });

    // ══════════════════════════════════════════
    //  DataChannel Keep-alive
    // ══════════════════════════════════════════
    function startKeepAlive() {
      stopKeepAlive();
      _lastPongTime = Date.now();
      _keepAliveTimer = setInterval(() => {
        if (!pc || pc.connectionState !== 'connected') return;
        // DataChannelが使えるなら ping
        if (_dataChannel && _dataChannel.readyState === 'open') {
          try { _dataChannel.send('ping'); } catch {}
        }
        // 最後のpongから30秒以上経過 → 接続が死んでいる可能性
        if (_dataChannel && Date.now() - _lastPongTime > 30000) {
          reportError('keepalive', 'pong timeout → ICE restart');
          if (isInit) doIceRestart();
        }
      }, 5000);
    }
    function stopKeepAlive() {
      if (_keepAliveTimer) { clearInterval(_keepAliveTimer); _keepAliveTimer = null; }
    }

    // ══════════════════════════════════════════
    //  音声ウォッチドッグ（確実に再生し続ける）
    // ══════════════════════════════════════════
    function startAudioWatchdog() {
      stopAudioWatchdog();
      _audioWatchdog = setInterval(() => {
        const audio = $('remote-audio');
        if (!audio || !audio.srcObject || isSpeakerOn) return;
        if (audio.paused || audio.ended) {
          audio.muted  = false;
          audio.volume = 1.0;
          audio.play()
            .then(() => { $('audio-banner').style.display = 'none'; })
            .catch(() => { $('audio-banner').style.display = 'flex'; });
        }
      }, 1500);
    }

    function stopAudioWatchdog() {
      if (_audioWatchdog) { clearInterval(_audioWatchdog); _audioWatchdog = null; }
    }

    // ══════════════════════════════════════════
    //  音声再生（複数手段でリトライ）
    // ══════════════════════════════════════════
    function tryPlayAudio(audio) {
      if (isSpeakerOn) return;
      audio.muted  = false;
      audio.volume = 1.0;

      function attempt(retry) {
        if (!audio.srcObject) return;
        audio.play()
          .then(() => {
            $('audio-banner').style.display = 'none';
            _audioUnlocked = true;
            startAudioWatchdog();
          })
          .catch(() => {
            if (retry > 0) {
              setTimeout(() => attempt(retry - 1), 400);
            } else {
              // ユーザータップが必要
              $('audio-banner').style.display = 'flex';
              startAudioWatchdog(); // タップ後に確実に再生できるよう監視継続
            }
          });
      }
      attempt(5); // 最大5回リトライ
    }

    // 音声バナータップ
    function enableAudio() {
      $('audio-banner').style.display = 'none';
      _audioUnlocked = true;

      // AudioContext初期化（スピーカー用）
      if (!_audioCtx || _audioCtx.state === 'closed') {
        try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
      }
      if (_audioCtx) _audioCtx.resume().catch(() => {});

      // ピロリ待機中ならここで開始
      if (_piroriPlaying && !_piroriTimer) _playPirori();

      const audio = $('remote-audio');
      if (!isSpeakerOn) {
        audio.muted  = false;
        audio.volume = 1.0;
        audio.play()
          .then(() => startAudioWatchdog())
          .catch(() => startAudioWatchdog()); // ウォッチドッグに任せる
      }
    }

    // 画面タップでも再生を試みる（バナー以外の場所でもOK）
    document.addEventListener('touchstart', () => {
      const audio = $('remote-audio');
      if (!isSpeakerOn && audio && audio.srcObject && audio.paused) {
        audio.play()
          .then(() => {
            $('audio-banner').style.display = 'none';
            _audioUnlocked = true;
          })
          .catch(() => {});
      }
    }, { passive: true });

    // ══════════════════════════════════════════
    //  ピロリ音（発信待機中）
    // ══════════════════════════════════════════
    let _piroriTimer = null, _piroriPlaying = false;

    function _playPirori() {
      if (!_piroriPlaying) return; // stopPirori()後のタイマー発火を防ぐ
      if (!_audioCtx || _audioCtx.state === 'closed') return;
      if (_audioCtx.state === 'suspended') {
        _audioCtx.resume().then(() => { if (_piroriPlaying) _playPirori(); }).catch(() => {});
        return;
      }
      const seq = [
        { f: 587,  d: 0.11 }, { f: 784,  d: 0.11 }, { f: 988,  d: 0.11 }, { f: 1175, d: 0.20 },
        { f: 0,    d: 0.06 }, { f: 880,  d: 0.11 }, { f: 784,  d: 0.11 }, { f: 659,  d: 0.18 },
      ];
      let t = _audioCtx.currentTime + 0.04, totalDur = 0;
      for (const { f, d } of seq) {
        if (f > 0) {
          const osc = _audioCtx.createOscillator(), gain = _audioCtx.createGain();
          osc.type = 'sine'; osc.frequency.value = f;
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.26, t + 0.015);
          gain.gain.linearRampToValueAtTime(0, t + d - 0.015);
          osc.connect(gain); gain.connect(_audioCtx.destination);
          osc.start(t); osc.stop(t + d);
        }
        t += d; totalDur += d;
      }
      _piroriTimer = setTimeout(_playPirori, (totalDur + 0.65) * 1000);
    }

    function startPirori() {
      if (_piroriPlaying) return;
      _piroriPlaying = true;
      // AudioContextがない場合は作成を試みる（ユーザーアクション後ならブロックされない）
      if (!_audioCtx || _audioCtx.state === 'closed') {
        try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
      }
      if (_audioCtx && _audioCtx.state !== 'closed') {
        if (_audioCtx.state === 'suspended') {
          // suspendedなら resume してから再生
          _audioCtx.resume()
            .then(() => { if (_piroriPlaying) _playPirori(); })
            .catch(() => {}); // 失敗時は enableAudio() バナーに任せる
        } else {
          _playPirori();
        }
      }
      // _audioCtxが作れない場合: enableAudio()タップ時に _piroriPlaying フラグを見て開始
    }

    function stopPirori() {
      _piroriPlaying = false;
      if (_piroriTimer) { clearTimeout(_piroriTimer); _piroriTimer = null; }
    }

    // ══════════════════════════════════════════
    //  スピーカー切替
    // ══════════════════════════════════════════
    function toggleSpeaker() {
      isSpeakerOn = !isSpeakerOn;
      $('speaker-btn').classList.toggle('active', isSpeakerOn);
      $('speaker-label').textContent = isSpeakerOn ? 'スピーカーON' : 'スピーカー';

      if (isSpeakerOn) {
        stopAudioWatchdog();
        if (!_audioCtx || _audioCtx.state === 'closed') {
          try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
        }
        if (_audioCtx) _audioCtx.resume().catch(() => {});
        const audio = $('remote-audio');
        if (audio.srcObject && _audioCtx) {
          if (_speakerSource) { try { _speakerSource.disconnect(); } catch {} }
          try {
            _speakerSource = _audioCtx.createMediaStreamSource(audio.srcObject);
            _speakerSource.connect(_audioCtx.destination);
          } catch {}
        }
        $('remote-audio').muted = true;
        $('audio-banner').style.display = 'none';
      } else {
        if (_speakerSource) { try { _speakerSource.disconnect(); } catch {} _speakerSource = null; }
        if (_audioCtx) { try { _audioCtx.suspend(); } catch {} }
        $('remote-audio').muted = false;
        startAudioWatchdog();
      }
    }

    // ══════════════════════════════════════════
    //  Socket
    // ══════════════════════════════════════════
    const socket = io({ auth: { token }, transports: ['websocket'] });

    socket.on('connect', () => {
      socket.emit('joinCallRoom', { roomId, displayName: me.displayName || me.username, avatar: me.avatar || '' });
    });

    // Socket切断時に再接続
    socket.on('disconnect', () => {
      setTimeout(() => {
        if (!socket.connected) socket.connect();
      }, 1000);
    });

    let waitingTimeoutId = null;

    socket.on('callRoomWaiting', () => {
      $('status').textContent = '呼び出し中...';
      $('avatar').classList.add('ringing');
      if (isInit) {
        startPirori();
        waitingTimeoutId = setTimeout(() => {
          waitingTimeoutId = null;
          stopPirori();
          // iOSはlocation.hrefで遷移するのでindex.htmlのsocketが消える
          // そのためcall.html側でrejectCallを送る（Androidはindex.htmlが別タブで生きているのでスキップ）
          const _isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
          if (calleeId && _isIOS) socket.emit('rejectCall', { toUserId: calleeId, reason: 'timeout' });
          endCall(_isIOS ? false : true); // iOS: callHangup不要, Android: callHangupで部屋を閉じる
          $('status').textContent = '応答がありませんでした';
        }, 90000);
      }
      if (navigator.vibrate) navigator.vibrate([400, 300, 400, 300, 400]);
    });

    socket.on('callRoomReady', ({ users }) => {
      if (waitingTimeoutId) { clearTimeout(waitingTimeoutId); waitingTimeoutId = null; }
      stopPirori();
      $('avatar').classList.remove('ringing');
      const other = users.find(u => u.userId !== me.id);
      if (other) {
        partnerUserId = other.userId;
        const name = other.displayName || '?';
        $('contact-name').textContent = name;
        const avatarEl = $('avatar');
        avatarEl.innerHTML = '';
        const safeOtherAvatar = sanitizeAvatarUrl(other.avatar);
        if (safeOtherAvatar) {
          const img = document.createElement('img');
          img.src = safeOtherAvatar;
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
          img.onerror = () => { avatarEl.innerHTML = ''; avatarEl.textContent = name[0].toUpperCase(); };
          avatarEl.appendChild(img);
        } else {
          avatarEl.textContent = name[0].toUpperCase();
        }
      }
      $('status').textContent = '接続中...';
      if (isInit) startWebRTC();
    });

    socket.on('callOffer', async ({ offer }) => {
      try {
        await loadIceServers();
        await initPC();
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        await flushIceCandidateQueue(); // ★ キュー内の候補を追加
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        // ★ アンサー側も TURN 候補が揃ってから返信（対称NAT対策）
        await waitForIceGathering(pc, 2000);
        socket.emit('callAnswer', { roomId, answer });
      } catch (e) {
        console.error('[callOffer]', e);
        showError('接続に失敗しました');
      }
    });

    socket.on('callAnswer', async ({ answer }) => {
      try {
        if (pc && answer) {
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
          await flushIceCandidateQueue(); // ★ キュー内の候補を追加
        }
      } catch (e) {
        console.warn('[callAnswer]', e);
      }
    });

    socket.on('callIceCandidate', async ({ candidate }) => {
      if (!candidate) return;
      try {
        if (pc && pc.remoteDescription && pc.remoteDescription.type) {
          // remoteDescriptionが確定済み → 即座に追加
          await pc.addIceCandidate(new RTCIceCandidate(candidate));
        } else {
          // ★ まだremoteDescription未確定 → キューに積む（ここが通話失敗の主因だった）
          _iceCandidateQueue.push(candidate);
        }
      } catch (e) {
        console.warn('[ICE] addIceCandidate failed:', e.message);
      }
    });

    // キューに積まれたICE候補を全てflushする
    async function flushIceCandidateQueue() {
      while (_iceCandidateQueue.length > 0) {
        const candidate = _iceCandidateQueue.shift();
        try {
          if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate));
        } catch {}
      }
    }

    socket.on('callHangup', () => endCall(false));

    // ★ 通話室が満員（3人目以降の参加を拒否）
    socket.on('callRoomFull', () => {
      showError('この通話は既に接続中のため参加できません');
    });

    // ══════════════════════════════════════════
    //  ICE再接続
    // ══════════════════════════════════════════
    const ICE_RESTART_MAX = 8; // 最大ICE再起動回数（ネットワーク不安定時の粘り強さ向上）

    async function doIceRestart() {
      if (!pc) return;
      // ★ 再入防止: 既にrestart実行中なら無視（concurrent呼び出しによるInvalidStateError防止）
      if (_iceRestartInProgress) return;
      if (_iceRestartCount >= ICE_RESTART_MAX) {
        // 上限回数リトライしても繋がらない → ユーザーに通知して終話
        reportError('ice-give-up', `gave up after ${_iceRestartCount} restarts`);
        $('status').textContent = '接続できませんでした。通話を終了します';
        setTimeout(() => endCall(false), 2000);
        return;
      }
      _iceRestartInProgress = true;
      _iceRestartCount++;
      $('status').textContent = `再接続中... (${_iceRestartCount}/${ICE_RESTART_MAX})`;
      try {
        // socketが切れている場合は接続を待つ（最大10秒 — 無限waitによるリスナーリーク防止）
        if (!socket.connected) {
          socket.connect();
          const didConnect = await new Promise(resolve => {
            let settled = false;
            const onConn = () => { if (!settled) { settled = true; clearTimeout(tid); resolve(true); } };
            const tid = setTimeout(() => { if (!settled) { settled = true; socket.off('connect', onConn); resolve(false); } }, 10000);
            socket.once('connect', onConn);
          });
          if (!didConnect) {
            reportError('doIceRestart', 'socket reconnect timeout');
            return;
          }
          // 再接続後、call roomに再参加
          socket.emit('joinCallRoom', { roomId, displayName: me.displayName || me.username, avatar: me.avatar || '' });
          await new Promise(r => setTimeout(r, 1000)); // room ready を待つ
          // ★ ソケット切断中に相手が受け取れなかったICE候補を再送（候補ロスト対策）
          if (_sentCandidates.length > 0) {
            _sentCandidates.forEach(c => socket.emit('callIceCandidate', { roomId, candidate: c }));
          }
        }

        // ★ relay-onlyフォールバック: 4回以上失敗したらTURN強制（対称NAT完全突破）
        if (_iceRestartCount >= 4 && !_relayFallbackTriggered && iceConfig.iceServers.some(s => String(s.urls).startsWith('turn'))) {
          _relayFallbackTriggered = true;
          reportError('ice-relay-fallback', `switching to relay-only at attempt ${_iceRestartCount}`);
          $('status').textContent = 'TURN経由で再接続中...';
          // 既存PCを閉じてrelay-onlyで再作成
          if (pc) { try { pc.close(); } catch {} }
          const relayConfig = { ...iceConfig, iceTransportPolicy: 'relay' };
          pc = new RTCPeerConnection(relayConfig);
          _iceCandidateQueue = [];
          _sentCandidates = [];
          localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
          // イベントハンドラを再設定（initPCの内容を最小限で再現）
          pc.onicecandidate = ({ candidate }) => {
            if (candidate) {
              _sentCandidates.push(candidate);
              socket.emit('callIceCandidate', { roomId, candidate });
            }
          };
          pc.oniceconnectionstatechange = () => {
            if (!pc) return;
            const s = pc.iceConnectionState;
            if (s === 'connected' || s === 'completed') { onCallConnected(); startKeepAlive(); startAudioWatchdog(); }
            if (s === 'failed') {
              reportError('ice-relay-failed', 'relay mode also failed');
              $('status').textContent = '接続できませんでした';
              setTimeout(() => endCall(false), 2000);
            }
          };
          pc.ontrack = e => {
            const stream = e.streams[0] || new MediaStream([e.track]);
            const audio = $('remote-audio');
            if (e.track.kind === 'video') { const rv = $('remote-video'); if (rv) { rv.srcObject = stream; rv.play().catch(()=>{}); } return; }
            if (audio.srcObject && audio.srcObject.id === stream.id) return;
            audio.srcObject = stream; audio.volume = 1.0; audio.muted = isSpeakerOn;
            tryPlayAudio(audio);
          };
        }

        const offer = await pc.createOffer({ iceRestart: !_relayFallbackTriggered });
        await pc.setLocalDescription(offer);
        // ★ ICE restart時もTURN候補が揃うまで待つ（relay fallback時に特に重要）
        await waitForIceGathering(pc, 2000);
        socket.emit('callOffer', { roomId, offer });
      } catch (e) {
        reportError('doIceRestart', e.message);
      } finally {
        _iceRestartInProgress = false; // ★ 完了・失敗いずれでも必ずリセット
      }
    }

    // ══════════════════════════════════════════
    //  WebRTC 初期化
    // ══════════════════════════════════════════
    async function initPC() {
      // マイク準備完了を待ってから PeerConnection 作成
      await waitLocalStream();
      if (!localStream) throw new Error('mic denied');

      if (pc) { try { pc.close(); } catch {} }
      pc = new RTCPeerConnection(iceConfig);
      _iceRestartCount = 0;
      _iceCandidateQueue = []; // ★ PC再作成時はキューをリセット
      _sentCandidates   = []; // ★ 送信済み候補もリセット（relay fallback後の重複再送防止）

      // ローカルトラック追加
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      // リモートトラック受信
      let _remoteStream = null;
      pc.ontrack = e => {
        const stream = e.streams[0] || new MediaStream([e.track]);

        // ビデオトラックはリモートビデオ要素に設定
        if (e.track.kind === 'video') {
          const rv = $('remote-video');
          if (rv) {
            rv.srcObject = stream;
            rv.play().catch(() => {});
            $('video-overlay').style.display = 'flex';
          }
          return;
        }

        // オーディオトラック
        const audio = $('remote-audio');
        if (audio.srcObject && audio.srcObject.id === stream.id) return;
        _remoteStream = stream;
        audio.srcObject = stream;
        audio.volume    = 1.0;
        audio.muted     = isSpeakerOn;

        if (isSpeakerOn && _audioCtx && _audioCtx.state === 'running') {
          if (_speakerSource) { try { _speakerSource.disconnect(); } catch {} }
          try {
            _speakerSource = _audioCtx.createMediaStreamSource(stream);
            _speakerSource.connect(_audioCtx.destination);
          } catch {}
        }

        tryPlayAudio(audio);
      };

      // DataChannel keep-alive（発信者側が作成、受信側は ondatachannel で受け取る）
      if (isInit) {
        try {
          _dataChannel = pc.createDataChannel('keepalive', { ordered: false, maxRetransmits: 0 });
          _dataChannel.onmessage = () => { _lastPongTime = Date.now(); };
          _dataChannel.onerror  = () => {};
        } catch {}
      } else {
        pc.ondatachannel = (e) => {
          _dataChannel = e.channel;
          _dataChannel.onmessage = (ev) => {
            if (ev.data === 'ping') { try { _dataChannel.send('pong'); } catch {} }
            _lastPongTime = Date.now();
          };
        };
      }

      // ICE候補
      pc.onicecandidate = ({ candidate }) => {
        if (candidate) {
          _sentCandidates.push(candidate); // ★ ソケット再接続後の再送に備えて記録
          socket.emit('callIceCandidate', { roomId, candidate });
        }
      };
      // ICE候補エラー（STUN到達不可 / TURNなし等）のログ
      pc.onicecandidateerror = (e) => {
        // errorCode 701 = STUN binding失敗（対称NATでよく出る）
        if (e.errorCode && e.errorCode !== 701) {
          reportError('icecandidateerror', `code=${e.errorCode} url=${e.url}`);
        }
      };

      // ICE接続状態
      pc.oniceconnectionstatechange = () => {
        if (!pc) return;
        const s = pc.iceConnectionState;
        if (s === 'checking') {
          $('status').textContent = '接続中...';
          // ★ 30秒以上checkingならICE restart（NAT越えに失敗している場合）
          if (_iceCheckingTimer) clearTimeout(_iceCheckingTimer);
          _iceCheckingTimer = setTimeout(() => {
            if (pc && pc.iceConnectionState === 'checking') {
              reportError('ice-timeout', 'checking > 30s → restart');
              if (isInit) doIceRestart();
            }
          }, 30000);
        }
        if (s === 'connected' || s === 'completed') {
          if (_iceCheckingTimer) { clearTimeout(_iceCheckingTimer); _iceCheckingTimer = null; }
          if (_iceRestartTimer)  { clearTimeout(_iceRestartTimer);  _iceRestartTimer  = null; }
          _iceRestartCount = 0;
          onCallConnected();
          startKeepAlive();
          if (!isSpeakerOn) startAudioWatchdog();
        }
        if (s === 'disconnected') {
          $('status').textContent = '再接続中...';
          stopKeepAlive();
          if (_iceRestartTimer) clearTimeout(_iceRestartTimer);
          // 4秒後にICE再接続
          if (isInit) _iceRestartTimer = setTimeout(doIceRestart, 4000);
        }
        if (s === 'failed') {
          stopKeepAlive();
          reportError('ice-failed', `restart#${_iceRestartCount}`);
          if (isInit) doIceRestart();
          else $('status').textContent = '接続が切れました';
        }
      };

      // 接続状態（ICEとは別）
      pc.onconnectionstatechange = () => {
        if (!pc) return;
        const s = pc.connectionState;
        if (s === 'connected') {
          onCallConnected();
          if (!isSpeakerOn) {
            // 接続確立直後も音声を確実に再生
            const audio = $('remote-audio');
            if (audio.srcObject) tryPlayAudio(audio);
          }
        }
        if (s === 'failed' && isInit) doIceRestart();
      };
    }

    function onCallConnected() {
      if (timerStarted) return;
      timerStarted = true;
      $('status').textContent = '通話中 00:00';
      timerInterval = setInterval(() => {
        timerSec++;
        const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
        const s = String(timerSec % 60).padStart(2, '0');
        $('status').textContent = `通話中 ${m}:${s}`;
      }, 1000);
    }

    // ★ ICE収集が'complete'になるまで最大maxMs待つ（TURN候補が揃ってからオファー送信するため）
    function waitForIceGathering(peerConn, maxMs = 2000) {
      return new Promise(resolve => {
        if (peerConn.iceGatheringState === 'complete') { resolve(); return; }
        const done = () => { peerConn.removeEventListener('icegatheringstatechange', onChange); resolve(); };
        const onChange = () => { if (peerConn.iceGatheringState === 'complete') done(); };
        peerConn.addEventListener('icegatheringstatechange', onChange);
        setTimeout(done, maxMs); // タイムアウトで強制突破（通常は1〜2秒以内）
      });
    }

    async function startWebRTC() {
      try {
        await loadIceServers();
        await initPC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        // ★ TURN候補が収集されるまで最大2秒待ってからオファー送信
        // （早すぎると対称NATのrelay候補が揃わず接続失敗の原因になる）
        await waitForIceGathering(pc, 2000);
        socket.emit('callOffer', { roomId, offer });
      } catch (e) {
        if (e.message !== 'mic denied') showError('通話の開始に失敗しました');
      }
    }

    // ══════════════════════════════════════════
    //  ミュート
    // ══════════════════════════════════════════
    function toggleMute() {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(t => { t.enabled = !isMuted; });
      $('mute-slash').style.display = isMuted ? 'block' : 'none';
      $('mute-label').textContent   = isMuted ? 'ミュート中' : 'ミュート';
      $('mute-btn').classList.toggle('active', isMuted);
      // ミュート中はスピーカーON不可（混乱を避けるため）
      const spkBtn = $('speaker-btn');
      spkBtn.disabled = isMuted;
      spkBtn.style.opacity = isMuted ? '0.35' : '1';
      if (isMuted && isSpeakerOn) toggleSpeaker(); // スピーカーもオフに
    }

    // ══════════════════════════════════════════
    //  カメラ切替（ビデオ通話用）
    // ══════════════════════════════════════════
    function toggleCamera() {
      if (!localStream) return;
      isCameraOff = !isCameraOff;
      localStream.getVideoTracks().forEach(t => { t.enabled = !isCameraOff; });
      const btn = $('camera-btn');
      const lbl = document.getElementById('camera-label');
      if (btn) btn.classList.toggle('active', isCameraOff);
      if (lbl) lbl.textContent = isCameraOff ? 'カメラON' : 'カメラOFF';
    }

    // ══════════════════════════════════════════
    //  通話終了
    // ══════════════════════════════════════════
    function endCall(notify = true) {
      stopPirori();
      stopAudioWatchdog();
      stopKeepAlive();
      if (waitingTimeoutId)  { clearTimeout(waitingTimeoutId);  waitingTimeoutId  = null; }
      if (_iceRestartTimer)  { clearTimeout(_iceRestartTimer);  _iceRestartTimer  = null; }
      if (_iceCheckingTimer) { clearTimeout(_iceCheckingTimer); _iceCheckingTimer = null; }
      if (_dataChannel) { try { _dataChannel.close(); } catch {} _dataChannel = null; }
      if (notify) socket.emit('callHangup', { roomId });
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (localStream)   { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      if (pc)            { pc.close(); pc = null; }
      _iceCandidateQueue = [];
      if (_speakerSource) { try { _speakerSource.disconnect(); } catch {} _speakerSource = null; }
      const rv = $('remote-video'); if (rv) rv.srcObject = null;
      const lv = $('local-video');  if (lv) lv.srcObject = null;

      const audio = $('remote-audio');
      if (audio) { audio.srcObject = null; }

      let durationText = '';
      if (timerSec > 0) {
        const m = Math.floor(timerSec / 60), s = timerSec % 60;
        durationText = m > 0 ? `${m}分${s}秒` : `${s}秒`;
        $('status').textContent = `通話時間  ${durationText}`;
        if (partnerUserId) {
          socket.emit('sendMessage', { toUserId: partnerUserId, text: `📞 通話  ${durationText}`, file: null });
        }
      } else {
        $('status').textContent = '通話終了';
      }

      $('main').querySelector('.buttons').innerHTML =
        '<div class="btn-wrap"><button class="btn btn-back" onclick="goBack()">← 戻る</button></div>';
      setTimeout(goBack, 3000);
    }

    function showError(msg) {
      $('main').style.display = 'none';
      $('error-box').style.display = 'flex';
      $('error-msg').textContent = msg;
    }

    function goBack() {
      if (window.opener && !window.opener.closed) window.close();
      else history.length > 1 ? history.back() : (location.href = '/');
    }

    window.addEventListener('beforeunload', () => { if (pc) endCall(true); });

    // 音声バナー: 1秒後に自動再生が成功しなかった場合のみ表示する
    // （Desktop: 一瞬チラつきを防ぐ / iOS: 確実に表示）
    setTimeout(() => {
      if (!_audioUnlocked) $('audio-banner').style.display = 'flex';
    }, 1200);
  </script>
</body>
</html>
