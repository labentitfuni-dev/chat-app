<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>通話中 - CHA</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #1a1a2e; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; user-select: none; overflow: hidden; }

    .avatar {
      width: 160px; height: 160px; border-radius: 50%; background: #06C755;
      display: flex; align-items: center; justify-content: center;
      font-size: 68px; font-weight: bold; color: white;
      margin-bottom: 20px; position: relative; z-index: 1; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar.ringing::before, .avatar.ringing::after {
      content: ''; position: absolute; border-radius: 50%;
      border: 3px solid rgba(6,199,85,0.35);
      animation: ripple 1.6s ease-out infinite; z-index: -1;
    }
    .avatar.ringing::after { animation-delay: 0.8s; }
    @keyframes ripple {
      0%   { width: 160px; height: 160px; opacity: 1; }
      100% { width: 300px; height: 300px; opacity: 0; }
    }

    #contact-name { font-size: 26px; font-weight: bold; margin-bottom: 8px; text-align: center; }
    #status { font-size: 13px; color: #888; margin-bottom: 52px; min-height: 18px; text-align: center; letter-spacing: 0.3px; }

    .buttons { display: flex; gap: 28px; align-items: flex-end; }
    .btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .btn-label { font-size: 12px; color: #aaa; }
    .btn {
      border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.2s;
    }
    .btn:active { transform: scale(0.88); }
    .btn-mute    { width: 64px; height: 64px; font-size: 26px; background: #2a2a3e; color: white; }
    .btn-mute.active { background: #e53935; }
    .btn-end     { width: 76px; height: 76px; font-size: 32px; background: #e53935; color: white; }
    .btn-speaker { width: 64px; height: 64px; font-size: 26px; background: #2a2a3e; color: white; }
    .btn-speaker.active { background: #06C755; }

    #audio-banner {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.80);
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    #audio-banner .tap-btn {
      background: #06C755; color: white; border: none; border-radius: 50px;
      padding: 20px 48px; font-size: 20px; font-weight: bold; cursor: pointer;
      animation: pulse-green 1.2s ease-in-out infinite;
    }
    #audio-banner p { color: #ccc; font-size: 14px; }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(6,199,85,0.5); }
      50%       { box-shadow: 0 0 0 16px rgba(6,199,85,0); }
    }

    #error-box {
      display: none; flex-direction: column; align-items: center; gap: 20px; padding: 32px; text-align: center;
    }
    #error-box p { color: #e57373; font-size: 17px; line-height: 1.6; white-space: pre-line; }
    .btn-back { background: #06C755; color: white; border: none; border-radius: 24px; padding: 12px 28px; font-size: 15px; font-weight: bold; cursor: pointer; }

    audio { display: none; }
  </style>
</head>
<body>
  <!-- playsinline + autoplay はブラウザのポリシーに従う。音声ウォッチドッグで確実に再生 -->
  <audio id="remote-audio" autoplay playsinline></audio>
  <audio id="local-audio"  autoplay muted   playsinline></audio>

  <div id="main" style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <div class="avatar" id="avatar"></div>
    <div id="contact-name">接続中...</div>
    <div id="status">相手を待っています...</div>
    <div class="buttons">
      <div class="btn-wrap">
        <button class="btn btn-mute" id="mute-btn" onclick="toggleMute()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="8"  y1="21" x2="16" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line id="mute-slash" x1="3" y1="21" x2="21" y2="3" stroke="white" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
          </svg>
        </button>
        <span class="btn-label" id="mute-label">ミュート</span>
      </div>

      <div class="btn-wrap">
        <button class="btn btn-end" onclick="endCall(true)">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="white">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.37 1.02-.22 1.1.4 2.28.62 3.58.62.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.56 21 3 13.44 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.32.22 2.58.62 3.76.12.33.04.7-.22.97L6.6 10.8z" transform="rotate(135 12 12)"/>
          </svg>
        </button>
        <span class="btn-label">終了</span>
      </div>

      <div class="btn-wrap">
        <button class="btn btn-speaker" id="speaker-btn" onclick="toggleSpeaker()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="btn-label" id="speaker-label">スピーカー</span>
      </div>
    </div>
  </div>

  <div id="audio-banner">
    <button class="tap-btn" onclick="enableAudio()">🔊 タップして音声を開始</button>
    <p>ブラウザの制限により手動で音声を有効にする必要があります</p>
  </div>

  <div id="error-box">
    <p id="error-msg">エラーが発生しました</p>
    <button class="btn-back" onclick="goBack()">← 戻る</button>
  </div>

  <script>
    const params   = new URLSearchParams(location.search);
    const roomId   = params.get('room');
    const isInit   = params.get('initiator') === 'true';
    const calleeId = params.get('to') || null; // 発信者のみ：着信側のuserId（不在着信メッセージ用）
    const token    = localStorage.getItem('token');
    const me       = JSON.parse(localStorage.getItem('user') || '{}');
    const $      = id => document.getElementById(id);

    if (!roomId || !token) { location.href = '/'; }

    // 相手の情報を即座に表示
    (function showContactInfo() {
      try {
        const c = JSON.parse(localStorage.getItem('callContact') || '{}');
        localStorage.removeItem('callContact');
        if (!c.name) return;
        $('contact-name').textContent = c.name;
        const avatarEl = $('avatar');
        if (c.avatar) {
          const img = document.createElement('img');
          img.src = c.avatar;
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
          img.onerror = () => { avatarEl.removeChild(img); avatarEl.textContent = c.name[0].toUpperCase(); };
          avatarEl.appendChild(img);
        } else {
          avatarEl.textContent = c.name[0].toUpperCase();
        }
      } catch {}
    })();

    // ══════════════════════════════════════════
    //  状態変数
    // ══════════════════════════════════════════
    let pc              = null;
    let localStream     = null;
    let isMuted         = false;
    let isSpeakerOn     = false;
    let timerSec        = 0;
    let timerInterval   = null;
    let timerStarted    = false;
    let partnerUserId   = null;
    let _audioCtx       = null;
    let _speakerSource  = null;
    let _audioUnlocked  = false;   // ユーザータップで音声が解放されたか
    let _audioWatchdog  = null;    // 音声ウォッチドッグタイマー
    let _iceRestartTimer = null;   // ICE再接続タイマー
    let _iceRestartCount = 0;      // ICE再接続試行回数
    let _localStreamReady = false; // マイク準備完了フラグ
    let _localStreamWaiters = [];  // マイク待ちPromiseのリゾルバ
    let iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    // ══════════════════════════════════════════
    //  ICEサーバー読み込み
    // ══════════════════════════════════════════
    async function loadIceServers() {
      try {
        const res = await fetch('/api/ice-servers');
        const servers = await res.json();
        if (Array.isArray(servers) && servers.length > 0) iceConfig = { iceServers: servers };
      } catch {}
    }

    // ══════════════════════════════════════════
    //  マイク取得（ページ読み込み直後・Promise化）
    // ══════════════════════════════════════════
    function waitLocalStream() {
      if (_localStreamReady) return Promise.resolve(localStream);
      return new Promise(resolve => _localStreamWaiters.push(resolve));
    }

    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(stream => {
        localStream = stream;
        $('local-audio').srcObject = stream;
        _localStreamReady = true;
        _localStreamWaiters.forEach(r => r(stream));
        _localStreamWaiters = [];
      })
      .catch(() => {
        showError('マイクの許可が必要です。\nブラウザの設定でマイクを許可してから\nもう一度お試しください。');
      });

    // ══════════════════════════════════════════
    //  音声ウォッチドッグ（確実に再生し続ける）
    // ══════════════════════════════════════════
    function startAudioWatchdog() {
      stopAudioWatchdog();
      _audioWatchdog = setInterval(() => {
        const audio = $('remote-audio');
        if (!audio || !audio.srcObject || isSpeakerOn) return;
        if (audio.paused || audio.ended) {
          audio.muted  = false;
          audio.volume = 1.0;
          audio.play()
            .then(() => { $('audio-banner').style.display = 'none'; })
            .catch(() => { $('audio-banner').style.display = 'flex'; });
        }
      }, 1500);
    }

    function stopAudioWatchdog() {
      if (_audioWatchdog) { clearInterval(_audioWatchdog); _audioWatchdog = null; }
    }

    // ══════════════════════════════════════════
    //  音声再生（複数手段でリトライ）
    // ══════════════════════════════════════════
    function tryPlayAudio(audio) {
      if (isSpeakerOn) return;
      audio.muted  = false;
      audio.volume = 1.0;

      function attempt(retry) {
        if (!audio.srcObject) return;
        audio.play()
          .then(() => {
            $('audio-banner').style.display = 'none';
            _audioUnlocked = true;
            startAudioWatchdog();
          })
          .catch(() => {
            if (retry > 0) {
              setTimeout(() => attempt(retry - 1), 400);
            } else {
              // ユーザータップが必要
              $('audio-banner').style.display = 'flex';
              startAudioWatchdog(); // タップ後に確実に再生できるよう監視継続
            }
          });
      }
      attempt(5); // 最大5回リトライ
    }

    // 音声バナータップ
    function enableAudio() {
      $('audio-banner').style.display = 'none';
      _audioUnlocked = true;

      // AudioContext初期化（スピーカー用）
      if (!_audioCtx || _audioCtx.state === 'closed') {
        try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
      }
      if (_audioCtx) _audioCtx.resume().catch(() => {});

      // ピロリ待機中ならここで開始
      if (_piroriPlaying && !_piroriTimer) _playPirori();

      const audio = $('remote-audio');
      if (!isSpeakerOn) {
        audio.muted  = false;
        audio.volume = 1.0;
        audio.play()
          .then(() => startAudioWatchdog())
          .catch(() => startAudioWatchdog()); // ウォッチドッグに任せる
      }
    }

    // 画面タップでも再生を試みる（バナー以外の場所でもOK）
    document.addEventListener('touchstart', () => {
      const audio = $('remote-audio');
      if (!isSpeakerOn && audio && audio.srcObject && audio.paused) {
        audio.play()
          .then(() => {
            $('audio-banner').style.display = 'none';
            _audioUnlocked = true;
          })
          .catch(() => {});
      }
    }, { passive: true });

    // ══════════════════════════════════════════
    //  ピロリ音（発信待機中）
    // ══════════════════════════════════════════
    let _piroriTimer = null, _piroriPlaying = false;

    function _playPirori() {
      if (!_audioCtx || _audioCtx.state === 'closed') return;
      if (_audioCtx.state === 'suspended') _audioCtx.resume().catch(() => {});
      const seq = [
        { f: 587,  d: 0.11 }, { f: 784,  d: 0.11 }, { f: 988,  d: 0.11 }, { f: 1175, d: 0.20 },
        { f: 0,    d: 0.06 }, { f: 880,  d: 0.11 }, { f: 784,  d: 0.11 }, { f: 659,  d: 0.18 },
      ];
      let t = _audioCtx.currentTime + 0.04, totalDur = 0;
      for (const { f, d } of seq) {
        if (f > 0) {
          const osc = _audioCtx.createOscillator(), gain = _audioCtx.createGain();
          osc.type = 'sine'; osc.frequency.value = f;
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.26, t + 0.015);
          gain.gain.linearRampToValueAtTime(0, t + d - 0.015);
          osc.connect(gain); gain.connect(_audioCtx.destination);
          osc.start(t); osc.stop(t + d);
        }
        t += d; totalDur += d;
      }
      _piroriTimer = setTimeout(_playPirori, (totalDur + 0.65) * 1000);
    }

    function startPirori() {
      if (_piroriPlaying) return;
      _piroriPlaying = true;
      if (_audioCtx && _audioCtx.state !== 'closed') _playPirori();
    }

    function stopPirori() {
      _piroriPlaying = false;
      if (_piroriTimer) { clearTimeout(_piroriTimer); _piroriTimer = null; }
    }

    // ══════════════════════════════════════════
    //  スピーカー切替
    // ══════════════════════════════════════════
    function toggleSpeaker() {
      isSpeakerOn = !isSpeakerOn;
      $('speaker-btn').classList.toggle('active', isSpeakerOn);
      $('speaker-label').textContent = isSpeakerOn ? 'スピーカーON' : 'スピーカー';

      if (isSpeakerOn) {
        stopAudioWatchdog();
        if (!_audioCtx || _audioCtx.state === 'closed') {
          try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
        }
        if (_audioCtx) _audioCtx.resume().catch(() => {});
        const audio = $('remote-audio');
        if (audio.srcObject && _audioCtx) {
          if (_speakerSource) { try { _speakerSource.disconnect(); } catch {} }
          try {
            _speakerSource = _audioCtx.createMediaStreamSource(audio.srcObject);
            _speakerSource.connect(_audioCtx.destination);
          } catch {}
        }
        $('remote-audio').muted = true;
        $('audio-banner').style.display = 'none';
      } else {
        if (_speakerSource) { try { _speakerSource.disconnect(); } catch {} _speakerSource = null; }
        if (_audioCtx) { try { _audioCtx.suspend(); } catch {} }
        $('remote-audio').muted = false;
        startAudioWatchdog();
      }
    }

    // ══════════════════════════════════════════
    //  Socket
    // ══════════════════════════════════════════
    const socket = io({ auth: { token }, transports: ['websocket'] });

    socket.on('connect', () => {
      socket.emit('joinCallRoom', { roomId, displayName: me.displayName || me.username, avatar: me.avatar || '' });
    });

    // Socket切断時に再接続
    socket.on('disconnect', () => {
      setTimeout(() => {
        if (!socket.connected) socket.connect();
      }, 1000);
    });

    let waitingTimeoutId = null;

    socket.on('callRoomWaiting', () => {
      $('status').textContent = '呼び出し中...';
      $('avatar').classList.add('ringing');
      if (isInit) {
        startPirori();
        waitingTimeoutId = setTimeout(() => {
          waitingTimeoutId = null;
          stopPirori();
          // iOSはlocation.hrefで遷移するのでindex.htmlのsocketが消える
          // そのためcall.html側でrejectCallを送る（Androidはindex.htmlが別タブで生きているのでスキップ）
          const _isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
          if (calleeId && _isIOS) socket.emit('rejectCall', { toUserId: calleeId, reason: 'timeout' });
          endCall(_isIOS ? false : true); // iOS: callHangup不要, Android: callHangupで部屋を閉じる
          $('status').textContent = '応答がありませんでした';
        }, 90000);
      }
      if (navigator.vibrate) navigator.vibrate([400, 300, 400, 300, 400]);
    });

    socket.on('callRoomReady', ({ users }) => {
      if (waitingTimeoutId) { clearTimeout(waitingTimeoutId); waitingTimeoutId = null; }
      stopPirori();
      $('avatar').classList.remove('ringing');
      const other = users.find(u => u.userId !== me.id);
      if (other) {
        partnerUserId = other.userId;
        const name = other.displayName || '?';
        $('contact-name').textContent = name;
        const avatarEl = $('avatar');
        avatarEl.innerHTML = '';
        if (other.avatar) {
          const img = document.createElement('img');
          img.src = other.avatar;
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
          img.onerror = () => { avatarEl.innerHTML = ''; avatarEl.textContent = name[0].toUpperCase(); };
          avatarEl.appendChild(img);
        } else {
          avatarEl.textContent = name[0].toUpperCase();
        }
      }
      $('status').textContent = '接続中...';
      if (isInit) startWebRTC();
    });

    socket.on('callOffer', async ({ offer }) => {
      try {
        await loadIceServers();
        await initPC();
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('callAnswer', { roomId, answer });
      } catch (e) { showError('接続に失敗しました'); }
    });

    socket.on('callAnswer', async ({ answer }) => {
      try {
        if (pc && answer) {
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
        }
      } catch {}
    });

    socket.on('callIceCandidate', async ({ candidate }) => {
      try {
        if (pc && candidate) await pc.addIceCandidate(new RTCIceCandidate(candidate));
      } catch {}
    });

    socket.on('callHangup', () => endCall(false));

    // ══════════════════════════════════════════
    //  ICE再接続
    // ══════════════════════════════════════════
    async function doIceRestart() {
      if (!pc || _iceRestartCount >= 3) return;
      _iceRestartCount++;
      try {
        const offer = await pc.createOffer({ iceRestart: true });
        await pc.setLocalDescription(offer);
        socket.emit('callOffer', { roomId, offer });
      } catch {}
    }

    // ══════════════════════════════════════════
    //  WebRTC 初期化
    // ══════════════════════════════════════════
    async function initPC() {
      // マイク準備完了を待ってから PeerConnection 作成
      await waitLocalStream();
      if (!localStream) throw new Error('mic denied');

      if (pc) { try { pc.close(); } catch {} }
      pc = new RTCPeerConnection(iceConfig);
      _iceRestartCount = 0;

      // ローカルトラック追加
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      // リモートトラック受信
      pc.ontrack = e => {
        const audio = $('remote-audio');
        const stream = e.streams[0] || new MediaStream([e.track]);

        // 同じstreamなら再設定しない（二重再生防止）
        if (audio.srcObject && audio.srcObject.id === stream.id) return;

        audio.srcObject = stream;
        audio.volume    = 1.0;
        audio.muted     = isSpeakerOn;

        // スピーカーモードON中なら再接続
        if (isSpeakerOn && _audioCtx && _audioCtx.state === 'running') {
          if (_speakerSource) { try { _speakerSource.disconnect(); } catch {} }
          try {
            _speakerSource = _audioCtx.createMediaStreamSource(stream);
            _speakerSource.connect(_audioCtx.destination);
          } catch {}
        }

        tryPlayAudio(audio);
      };

      // ICE候補
      pc.onicecandidate = ({ candidate }) => {
        if (candidate) socket.emit('callIceCandidate', { roomId, candidate });
      };

      // ICE接続状態
      pc.oniceconnectionstatechange = () => {
        if (!pc) return;
        const s = pc.iceConnectionState;
        if (s === 'checking')    { $('status').textContent = '接続中...'; }
        if (s === 'connected' || s === 'completed') {
          if (_iceRestartTimer) { clearTimeout(_iceRestartTimer); _iceRestartTimer = null; }
          _iceRestartCount = 0;
          onCallConnected();
          // 接続確立時に音声ウォッチドッグ起動
          if (!isSpeakerOn) startAudioWatchdog();
        }
        if (s === 'disconnected') {
          $('status').textContent = '再接続中...';
          // 4秒後にICE再接続（発信者がオファーを送り直す）
          if (_iceRestartTimer) clearTimeout(_iceRestartTimer);
          if (isInit) _iceRestartTimer = setTimeout(doIceRestart, 4000);
        }
        if (s === 'failed') {
          // 即座にICE再接続を試みる
          if (isInit) doIceRestart();
          else $('status').textContent = '接続が切れました';
        }
      };

      // 接続状態（ICEとは別）
      pc.onconnectionstatechange = () => {
        if (!pc) return;
        const s = pc.connectionState;
        if (s === 'connected') {
          onCallConnected();
          if (!isSpeakerOn) {
            // 接続確立直後も音声を確実に再生
            const audio = $('remote-audio');
            if (audio.srcObject) tryPlayAudio(audio);
          }
        }
        if (s === 'failed' && isInit) doIceRestart();
      };
    }

    function onCallConnected() {
      if (timerStarted) return;
      timerStarted = true;
      $('status').textContent = '通話中 00:00';
      timerInterval = setInterval(() => {
        timerSec++;
        const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
        const s = String(timerSec % 60).padStart(2, '0');
        $('status').textContent = `通話中 ${m}:${s}`;
      }, 1000);
    }

    async function startWebRTC() {
      try {
        await loadIceServers();
        await initPC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('callOffer', { roomId, offer });
      } catch (e) {
        if (e.message !== 'mic denied') showError('通話の開始に失敗しました');
      }
    }

    // ══════════════════════════════════════════
    //  ミュート
    // ══════════════════════════════════════════
    function toggleMute() {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(t => { t.enabled = !isMuted; });
      $('mute-slash').style.display = isMuted ? 'block' : 'none';
      $('mute-label').textContent   = isMuted ? 'ミュート中' : 'ミュート';
      $('mute-btn').classList.toggle('active', isMuted);
    }

    // ══════════════════════════════════════════
    //  通話終了
    // ══════════════════════════════════════════
    function endCall(notify = true) {
      stopPirori();
      stopAudioWatchdog();
      if (_iceRestartTimer) { clearTimeout(_iceRestartTimer); _iceRestartTimer = null; }
      if (notify) socket.emit('callHangup', { roomId });
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (localStream)   { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      if (pc)            { pc.close(); pc = null; }
      if (_speakerSource) { try { _speakerSource.disconnect(); } catch {} _speakerSource = null; }

      const audio = $('remote-audio');
      if (audio) { audio.srcObject = null; }

      let durationText = '';
      if (timerSec > 0) {
        const m = Math.floor(timerSec / 60), s = timerSec % 60;
        durationText = m > 0 ? `${m}分${s}秒` : `${s}秒`;
        $('status').textContent = `通話時間  ${durationText}`;
        if (partnerUserId) {
          socket.emit('sendMessage', { toUserId: partnerUserId, text: `📞 通話  ${durationText}`, file: null });
        }
      } else {
        $('status').textContent = '通話終了';
      }

      $('main').querySelector('.buttons').innerHTML =
        '<div class="btn-wrap"><button class="btn btn-back" onclick="goBack()">← 戻る</button></div>';
      setTimeout(goBack, 3000);
    }

    function showError(msg) {
      $('main').style.display = 'none';
      $('error-box').style.display = 'flex';
      $('error-msg').textContent = msg;
    }

    function goBack() {
      if (window.opener && !window.opener.closed) window.close();
      else history.length > 1 ? history.back() : (location.href = '/');
    }

    window.addEventListener('beforeunload', () => { if (pc) endCall(true); });

    // 最初のタップで音声バナーを表示
    $('audio-banner').style.display = 'flex';
  </script>
</body>
</html>
