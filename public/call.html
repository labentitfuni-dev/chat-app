<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>通話中 - ChatApp</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #1a1a2e; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; user-select: none; overflow: hidden; }

    .avatar {
      width: 160px; height: 160px; border-radius: 50%; background: #06C755;
      display: flex; align-items: center; justify-content: center;
      font-size: 68px; font-weight: bold; color: white;
      margin-bottom: 20px; position: relative; z-index: 1; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar.ringing::before, .avatar.ringing::after {
      content: ''; position: absolute; border-radius: 50%;
      border: 3px solid rgba(6,199,85,0.35);
      animation: ripple 1.6s ease-out infinite; z-index: -1;
    }
    .avatar.ringing::after { animation-delay: 0.8s; }
    @keyframes ripple {
      0%   { width: 160px; height: 160px; opacity: 1; }
      100% { width: 300px; height: 300px; opacity: 0; }
    }

    #contact-name { font-size: 26px; font-weight: bold; margin-bottom: 8px; text-align: center; }
    #status { font-size: 13px; color: #888; margin-bottom: 52px; min-height: 18px; text-align: center; letter-spacing: 0.3px; }

    /* ボタン群 */
    .buttons { display: flex; gap: 28px; align-items: flex-end; }
    .btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .btn-label { font-size: 12px; color: #aaa; }
    .btn {
      border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.2s;
    }
    .btn:active { transform: scale(0.88); }
    .btn-mute    { width: 64px; height: 64px; font-size: 26px; background: #2a2a3e; color: white; }
    .btn-mute.active { background: #e53935; }
    .btn-end     { width: 76px; height: 76px; font-size: 32px; background: #e53935; color: white; }
    .btn-speaker { width: 64px; height: 64px; font-size: 26px; background: #2a2a3e; color: white; }
    .btn-speaker.active { background: #06C755; }

    /* 音声有効化オーバーレイ */
    #audio-banner {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.75);
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    #audio-banner .tap-btn {
      background: #06C755; color: white; border: none; border-radius: 50px;
      padding: 20px 48px; font-size: 20px; font-weight: bold; cursor: pointer;
      animation: pulse-green 1.2s ease-in-out infinite;
    }
    #audio-banner p { color: #ccc; font-size: 14px; }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(6,199,85,0.5); }
      50%       { box-shadow: 0 0 0 16px rgba(6,199,85,0); }
    }

    #error-box {
      display: none; flex-direction: column; align-items: center; gap: 20px; padding: 32px; text-align: center;
    }
    #error-box p { color: #e57373; font-size: 17px; line-height: 1.6; white-space: pre-line; }
    .btn-back { background: #06C755; color: white; border: none; border-radius: 24px; padding: 12px 28px; font-size: 15px; font-weight: bold; cursor: pointer; }

    audio { display: none; }
  </style>
</head>
<body>
  <audio id="remote-audio" autoplay playsinline></audio>
  <audio id="local-audio"  autoplay muted playsinline></audio>

  <div id="main" style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <div class="avatar" id="avatar"></div>
    <div id="contact-name">接続中...</div>
    <div id="status">相手を待っています...</div>
    <div class="buttons">
      <div class="btn-wrap">
        <button class="btn btn-mute" id="mute-btn" onclick="toggleMute()">
          <!-- マイク -->
          <svg id="icon-mic" width="28" height="28" viewBox="0 0 24 24" fill="white">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="8"  y1="21" x2="16" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <!-- ミュート中（斜線） -->
          <svg id="icon-mic-off" width="28" height="28" viewBox="0 0 24 24" fill="white" style="display:none">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="8"  y1="21" x2="16" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="3"  y1="3"  x2="21" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="btn-label" id="mute-label">ミュート</span>
      </div>

      <div class="btn-wrap">
        <button class="btn btn-end" onclick="endCall(true)">
          <!-- 終話（受話器を斜めに） -->
          <svg width="34" height="34" viewBox="0 0 24 24" fill="white">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.37 1.02-.22 1.1.4 2.28.62 3.58.62.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.56 21 3 13.44 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.32.22 2.58.62 3.76.12.33.04.7-.22.97L6.6 10.8z" transform="rotate(135 12 12)"/>
          </svg>
        </button>
        <span class="btn-label">終了</span>
      </div>

      <div class="btn-wrap">
        <button class="btn btn-speaker" id="speaker-btn" onclick="enableAudio()">
          <!-- スピーカー -->
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="btn-label">音声ON</span>
      </div>
    </div>
  </div>

  <div id="audio-banner">
    <button class="tap-btn" onclick="enableAudio()">🔊 タップして音声を開始</button>
    <p>ブラウザの制限により手動で音声を有効にする必要があります</p>
  </div>

  <div id="error-box">
    <p id="error-msg">エラーが発生しました</p>
    <button class="btn-back" onclick="goBack()">← 戻る</button>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const roomId = params.get('room');
    const isInit = params.get('initiator') === 'true';
    const token  = localStorage.getItem('token');
    const me     = JSON.parse(localStorage.getItem('user') || '{}');

    if (!roomId || !token) { location.href = '/'; }

    // 相手の情報を即座に表示（発信・着信どちらも）
    (function showContactInfo() {
      try {
        const c = JSON.parse(localStorage.getItem('callContact') || '{}');
        localStorage.removeItem('callContact');
        if (!c.name) return;
        $('contact-name').textContent = c.name;
        const avatarEl = $('avatar');
        if (c.avatar) {
          const img = document.createElement('img');
          img.src = c.avatar;
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
          img.onerror = () => { avatarEl.removeChild(img); avatarEl.textContent = c.name[0].toUpperCase(); };
          avatarEl.appendChild(img);
        } else {
          avatarEl.textContent = c.name[0].toUpperCase();
        }
      } catch {}
    })();

    let iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    async function loadIceServers() {
      try {
        const res = await fetch('/api/ice-servers');
        const servers = await res.json();
        if (Array.isArray(servers) && servers.length > 0) {
          iceConfig = { iceServers: servers };
        }
      } catch {}
    }

    let pc = null, localStream = null;
    let isMuted = false, isSpeakerOn = true;
    let timerSec = 0, timerInterval = null;
    let timerStarted = false;
    let _audioCtx = null;  // AudioContext（スピーカー出力用）

    const $ = id => document.getElementById(id);

    // AudioContext を生成・再開（iOSスピーカー出力のため維持する）
    function getAudioCtx() {
      if (!_audioCtx) {
        try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
      }
      if (_audioCtx && _audioCtx.state !== 'running') {
        _audioCtx.resume().catch(() => {});
      }
      return _audioCtx;
    }

    // AudioContextを通してリモート音声をスピーカーに出力（iOS PWAでイヤピースでなくスピーカーから聞こえるようにする）
    function routeAudioToSpeaker(stream) {
      try {
        const ctx = getAudioCtx();
        if (!ctx) return;
        const src = ctx.createMediaStreamSource(stream);
        src.connect(ctx.destination);
      } catch {}
    }

    // ページ読み込み時に音声バナーを表示してユーザーに早めにタップしてもらう
    $('audio-banner').style.display = 'flex';

    // ---- Socket ----
    const socket = io({ auth: { token } });

    socket.on('connect', () => {
      socket.emit('joinCallRoom', { roomId, displayName: me.displayName || me.username });
    });

    socket.on('callRoomWaiting', () => {
      $('status').textContent = '相手を待っています...';
      $('avatar').classList.add('ringing');
    });

    socket.on('callRoomReady', ({ users }) => {
      $('avatar').classList.remove('ringing');
      const other = users.find(u => u.userId !== me.id);
      if (other && other.displayName) {
        $('contact-name').textContent = other.displayName;
        // アバターがまだ文字/空なら更新
        const avatarEl = $('avatar');
        if (!avatarEl.querySelector('img')) {
          avatarEl.textContent = other.displayName[0].toUpperCase();
        }
      }
      $('status').textContent = '接続中...';
      if (isInit) startWebRTC();
    });

    socket.on('callOffer', async ({ offer }) => {
      try {
        await loadIceServers();
        await initPC();
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('callAnswer', { roomId, answer });
      } catch (e) { showError('接続に失敗しました'); }
    });

    socket.on('callAnswer', async ({ answer }) => {
      try { if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer)); } catch {}
    });

    socket.on('callIceCandidate', async ({ candidate }) => {
      try { if (pc && candidate) await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
    });

    socket.on('callHangup', () => endCall(false));

    // ---- WebRTC ----
    async function initPC() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        $('local-audio').srcObject = localStream;
      } catch {
        showError('マイクの許可が必要です。\nブラウザの設定でマイクを許可してから\nもう一度お試しください。');
        throw new Error('mic denied');
      }

      pc = new RTCPeerConnection(iceConfig);
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      pc.ontrack = e => {
        const audio = $('remote-audio');
        const stream = e.streams[0] || new MediaStream([e.track]);
        audio.srcObject = stream;
        audio.volume = 1;
        audio.muted = false;
        // iOSでスピーカー出力するためAudioContext経由でルーティング
        routeAudioToSpeaker(stream);
        tryPlayAudio(audio);
        onCallConnected();
      };

      pc.onicecandidate = ({ candidate }) => {
        if (candidate) socket.emit('callIceCandidate', { roomId, candidate });
      };

      // ICE接続状態で細かくステータス更新
      pc.oniceconnectionstatechange = () => {
        if (!pc) return;
        const s = pc.iceConnectionState;
        if (s === 'checking')     $('status').textContent = '接続中...';
        if (s === 'connected' || s === 'completed') onCallConnected();
        if (s === 'disconnected') $('status').textContent = '再接続中...';
        if (s === 'failed')       showError('接続に失敗しました。\n両方ともWi-Fiに繋いで\nもう一度試してください。');
      };
    }

    function tryPlayAudio(audio) {
      // ユーザーがバナーをタップしてAudioContextが生きていれば直接スピーカー出力で再生
      const ctx = getAudioCtx();
      if (ctx && ctx.state === 'running' && audio.srcObject) {
        routeAudioToSpeaker(audio.srcObject);
      }
      audio.play().then(() => {
        $('audio-banner').style.display = 'none';
        $('speaker-btn').classList.add('active');
      }).catch(() => {
        $('audio-banner').style.display = 'flex';
      });
    }

    function enableAudio() {
      // ★ audio.play() はユーザージェスチャーのコールスタック内で同期的に呼ぶ（iOSの制限）
      // Promise.then() の中で呼ぶとジェスチャーが切れてブロックされる
      getAudioCtx();  // AudioContextを作成・resume（スピーカー出力のため保持）

      const audio = $('remote-audio');
      $('audio-banner').style.display = 'none';
      $('speaker-btn').classList.add('active');

      if (audio.srcObject) {
        routeAudioToSpeaker(audio.srcObject);  // iOS: AudioContext経由でスピーカーへ
        audio.muted = false;
        audio.volume = 1;
        const p = audio.play();
        if (p) p.catch(() => {});
      }
    }

    // 画面のどこをタップしても音声有効化を試みる
    document.addEventListener('touchstart', () => {
      getAudioCtx();  // AudioContextをアンロック
      const audio = $('remote-audio');
      if (audio.srcObject && audio.paused) {
        routeAudioToSpeaker(audio.srcObject);
        audio.play().then(() => {
          $('audio-banner').style.display = 'none';
          $('speaker-btn').classList.add('active');
        }).catch(() => {});
      }
    }, { passive: true });

    function onCallConnected() {
      if (timerStarted) return;
      timerStarted = true;
      $('status').textContent = '通話中 00:00';
      timerInterval = setInterval(() => {
        timerSec++;
        const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
        const s = String(timerSec % 60).padStart(2, '0');
        $('status').textContent = `通話中 ${m}:${s}`;
      }, 1000);
    }

    async function startWebRTC() {
      try {
        await loadIceServers();
        await initPC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('callOffer', { roomId, offer });
      } catch (e) {
        if (e.message !== 'mic denied') showError('通話の開始に失敗しました');
      }
    }

    function toggleMute() {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(t => { t.enabled = !isMuted; });
      $('icon-mic').style.display     = isMuted ? 'none'  : 'inline';
      $('icon-mic-off').style.display = isMuted ? 'inline': 'none';
      $('mute-label').textContent = isMuted ? 'ミュート中' : 'ミュート';
      $('mute-btn').classList.toggle('active', isMuted);
    }

    function endCall(notify = true) {
      if (notify) socket.emit('callHangup', { roomId });
      if (timerInterval) clearInterval(timerInterval);
      if (localStream)   localStream.getTracks().forEach(t => t.stop());
      if (pc)            { pc.close(); pc = null; }
      $('status').textContent = '通話終了';
      $('main').querySelector('.buttons').innerHTML =
        '<div class="btn-wrap"><button class="btn btn-back" onclick="goBack()">← 戻る</button></div>';
      setTimeout(goBack, 2000);
    }

    function showError(msg) {
      $('main').style.display = 'none';
      $('error-box').style.display = 'flex';
      $('error-msg').textContent = msg;
    }

    function goBack() {
      if (window.opener && !window.opener.closed) window.close();
      else history.length > 1 ? history.back() : (location.href = '/');
    }

    window.addEventListener('beforeunload', () => { if (pc) endCall(true); });
  </script>
</body>
</html>
